    /* ===== CREATE SCREEN INIT ===== */
    function openCreate() {
      state.selectedDates = [];
      state.members = [];
      state.calYear = new Date().getFullYear();
      state.calMonth = new Date().getMonth();
      document.getElementById('create-name').value = '';
      document.getElementById('create-memo').value = '';
      document.getElementById('create-deadline').value = '';
      document.getElementById('create-name-count').textContent = '0';
      renderMembers();
      renderSelectedDates();
      renderCal();
    }

    /* ===== CALENDAR ===== */
    function pad(n) { return n < 10 ? '0' + n : '' + n; }

    function renderCal() {
      var year = state.calYear;
      var month = state.calMonth;
      document.getElementById('cal-month-label').textContent = year + '年' + (month + 1) + '月';

      var grid = document.getElementById('cal-grid');
      grid.innerHTML = '';

      var dayLabels = ['日', '月', '火', '水', '木', '金', '土'];
      for (var h = 0; h < 7; h++) {
        var hd = document.createElement('div');
        hd.className = 'cal-header-cell';
        hd.textContent = dayLabels[h];
        if (h === 0) { hd.style.color = 'var(--no)'; }
        if (h === 6) { hd.style.color = '#4fa3e8'; }
        grid.appendChild(hd);
      }

      var firstDow = new Date(year, month, 1).getDay();
      var daysInMonth = new Date(year, month + 1, 0).getDate();
      var today = new Date();
      today.setHours(0, 0, 0, 0);

      for (var e = 0; e < firstDow; e++) {
        var empty = document.createElement('div');
        empty.className = 'cal-cell';
        grid.appendChild(empty);
      }

      for (var d = 1; d <= daysInMonth; d++) {
        var date = new Date(year, month, d);
        var dateStr = year + '-' + pad(month + 1) + '-' + pad(d);
        var dow = date.getDay();
        var isPast = date < today;
        var isSelected = state.selectedDates.indexOf(dateStr) !== -1;

        var cell = document.createElement('div');
        cell.className = 'cal-cell cal-day';
        cell.textContent = d;

        if (isPast) {
          cell.className = 'cal-cell cal-past';
        } else if (isSelected) {
          cell.classList.add('cal-selected');
          (function(ds) {
            cell.addEventListener('click', function() { toggleDate(ds); });
          })(dateStr);
        } else {
          if (dow === 0) { cell.classList.add('cal-sun'); }
          else if (dow === 6) { cell.classList.add('cal-sat'); }
          (function(ds) {
            cell.addEventListener('click', function() { toggleDate(ds); });
          })(dateStr);
        }

        grid.appendChild(cell);
      }
    }

    function toggleDate(dateStr) {
      var idx = state.selectedDates.indexOf(dateStr);
      if (idx === -1) {
        state.selectedDates.push(dateStr);
        state.selectedDates.sort();
      } else {
        state.selectedDates.splice(idx, 1);
      }
      renderCal();
      renderSelectedDates();
    }

    function renderSelectedDates() {
      var container = document.getElementById('selected-dates-list');
      container.innerHTML = '';
      for (var i = 0; i < state.selectedDates.length; i++) {
        (function(dateStr) {
          var tag = document.createElement('div');
          tag.className = 'date-tag';
          var labelNode = document.createTextNode(fmt(dateStr) + ' ');
          tag.appendChild(labelNode);
          var x = document.createElement('span');
          x.className = 'tag-x';
          x.textContent = '×';
          x.addEventListener('click', function(ev) {
            ev.stopPropagation();
            toggleDate(dateStr);
          });
          tag.appendChild(x);
          container.appendChild(tag);
        })(state.selectedDates[i]);
      }
    }

    /* ===== MEMBERS ===== */
    function addMember() {
      var input = document.getElementById('member-input');
      var name = input.value.trim();
      if (!name) { toast('名前を入力してください'); return; }
      if (name.length > 20) { toast('名前は20文字以内です'); return; }
      if (state.members.indexOf(name) !== -1) { toast('すでに追加されています'); return; }
      state.members.push(name);
      input.value = '';
      renderMembers();
    }

    function removeMember(name) {
      var idx = state.members.indexOf(name);
      if (idx !== -1) { state.members.splice(idx, 1); }
      renderMembers();
    }

    function renderMembers() {
      var container = document.getElementById('member-tags');
      container.innerHTML = '';
      for (var i = 0; i < state.members.length; i++) {
        (function(name) {
          var tag = document.createElement('div');
          tag.className = 'member-tag';
          var labelNode = document.createTextNode(name + ' ');
          tag.appendChild(labelNode);
          var x = document.createElement('span');
          x.className = 'tag-x';
          x.textContent = '×';
          x.addEventListener('click', function() { removeMember(name); });
          tag.appendChild(x);
          container.appendChild(tag);
        })(state.members[i]);
      }
    }

    /* ===== EVENT CREATION ===== */
    function createEvent() {
      var name = document.getElementById('create-name').value.trim();
      if (!name) { toast('イベント名を入力してください'); return; }
      if (state.selectedDates.length === 0) { toast('候補日を1つ以上選択してください'); return; }

      var memo = document.getElementById('create-memo').value.trim();
      var deadline = document.getElementById('create-deadline').value;
      var id = genId();

      var data = {
        id: id,
        name: name,
        memo: memo,
        dates: state.selectedDates.slice(),
        members: state.members.slice(),
        deadline: deadline,
        createdAt: Date.now(),
        priorities: {},
        answers: {}
      };

      var btn = document.getElementById('btn-create-submit');
      btn.textContent = '作成中…';
      btn.disabled = true;

      saveEvent(data).then(function() {
        var localDb = loadDB();
        localDb[id] = data;
        saveDB(localDb);

        state.eventId = id;
        state.eventData = data;

        renderCreated(data);
        go('created');
      }).catch(function() {
        toast('保存に失敗しました。通信を確認してください');
        btn.textContent = 'イベントを作成する';
        btn.disabled = false;
      });
    }

    function renderCreated(data) {
      document.getElementById('created-id-value').textContent = data.id;
      document.getElementById('created-event-name').textContent = data.name;

      var infoCard = document.getElementById('created-info-card');
      infoCard.innerHTML = '';

      var rowDates = document.createElement('div');
      rowDates.className = 'info-row';
      rowDates.textContent = '候補日：' + data.dates.length + '日間';
      infoCard.appendChild(rowDates);

      if (data.members.length > 0) {
        var rowMembers = document.createElement('div');
        rowMembers.className = 'info-row';
        rowMembers.textContent = '参加者：' + data.members.join('、');
        infoCard.appendChild(rowMembers);
      }

      if (data.deadline) {
        var rowDl = document.createElement('div');
        rowDl.className = 'info-row';
        rowDl.textContent = '締め切り：' + fmt(data.deadline);
        infoCard.appendChild(rowDl);
      }

      var shareUrl = location.origin + location.pathname + '?id=' + data.id;
      document.getElementById('created-share-url').textContent = shareUrl;
    }

    /* ===== COPY HELPERS ===== */
    function copyText(text) {
      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(function() {
          toast('コピーしました');
        }).catch(function() { fallbackCopy(text); });
      } else {
        fallbackCopy(text);
      }
    }

    function fallbackCopy(text) {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.top = '0';
      ta.style.left = '0';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      try {
        document.execCommand('copy');
        toast('コピーしました');
      } catch(e) {
        toast('コピーできませんでした');
      }
      document.body.removeChild(ta);
    }

    /* ===== JOIN ===== */
    function joinEvent() {
      var idEl = document.getElementById('join-id');
      var id = idEl.value.replace(/[^A-Za-z0-9]/g, '').toUpperCase();
      idEl.value = id;
      if (id.length !== 6) {
        document.getElementById('join-event-info').style.display = 'none';
        return;
      }

      getEvent(id).then(function(data) {
        if (!data) { toast('イベントが見つかりません'); return; }

        state.eventId = id;
        state.eventData = data;

        document.getElementById('join-event-name').textContent = data.name;
        var metaParts = [data.dates.length + '候補日'];
        if (data.deadline) { metaParts.push('締切 ' + fmt(data.deadline)); }
        document.getElementById('join-event-meta').textContent = metaParts.join('　');

        renderMemberChips(data);
        document.getElementById('join-event-info').style.display = 'block';
      }).catch(function() {
        toast('取得に失敗しました');
      });
    }

    function renderMemberChips(data) {
      var container = document.getElementById('join-member-chips');
      container.innerHTML = '';
      document.getElementById('join-name').value = '';

      if (!data.members || data.members.length === 0) { return; }

      for (var i = 0; i < data.members.length; i++) {
        (function(name) {
          var chip = document.createElement('button');
          chip.type = 'button';
          var key = sanitizeKey(name);
          var hasAnswer = data.answers && data.answers[key];
          chip.className = 'member-chip' + (hasAnswer ? ' answered' : '');
          var checkMark = hasAnswer ? '✓ ' : '';
          chip.textContent = checkMark + name;
          chip.addEventListener('click', function() {
            var chips = container.getElementsByClassName('member-chip');
            for (var j = 0; j < chips.length; j++) {
              chips[j].classList.remove('selected');
            }
            chip.classList.add('selected');
            document.getElementById('join-name').value = name;
          });
          container.appendChild(chip);
        })(data.members[i]);
      }
    }

    function goToAnswer() {
      var name = document.getElementById('join-name').value.trim();
      if (!name) { toast('お名前を入力してください'); return; }
      state.joinName = name;
      buildAnswerScreen();
      go('answer');
    }

    /* ===== ANSWER ===== */
    function buildAnswerScreen() {
      var data = state.eventData;
      var name = state.joinName;
      var key = sanitizeKey(name);
      var existing = (data.answers && data.answers[key]) ? data.answers[key] : null;

      /* respondent row */
      var row = document.getElementById('answer-respondent-row');
      row.innerHTML = '';
      var nameSpan = document.createElement('span');
      nameSpan.className = 'respondent-name';
      nameSpan.textContent = name;
      row.appendChild(nameSpan);
      var badge = document.createElement('span');
      badge.className = 'answer-badge ' + (existing ? 'badge-edit' : 'badge-new');

      /* restore existing choices */
      state.answerChoices = {};
      if (existing && existing.answers) {
        var exKeys = Object.keys(existing.answers);
        for (var k = 0; k < exKeys.length; k++) {
          state.answerChoices[exKeys[k]] = existing.answers[exKeys[k]];
        }
      }

      /* comment */
      document.getElementById('answer-comment').value = existing ? (existing.comment || '') : '';

      /* reset submit button */
      var submitBtn = document.getElementById('btn-submit-answer');
      submitBtn.textContent = '回答を送信する';
      submitBtn.disabled = false;

      /* date rows */
      var datesEl = document.getElementById('answer-dates');
      datesEl.innerHTML = '';

      var choiceDefs = [
        { value: 'ok',    label: '○', cls: 'choice-ok' },
        { value: 'maybe', label: '△', cls: 'choice-maybe' },
        { value: 'no',    label: '×', cls: 'choice-no' }
      ];

      for (var i = 0; i < data.dates.length; i++) {
        (function(dateStr) {
          var dateRow = document.createElement('div');
          dateRow.className = 'answer-date-row';

          var dateLabel = document.createElement('div');
          dateLabel.className = 'answer-date-label';
          dateLabel.textContent = fmt(dateStr);
          dateRow.appendChild(dateLabel);

          var group = document.createElement('div');
          group.className = 'choice-group';

          for (var j = 0; j < choiceDefs.length; j++) {
            (function(def) {
              var btn = document.createElement('button');
              btn.type = 'button';
              btn.className = 'choice-btn ' + def.cls;
              btn.textContent = def.label;
              if (state.answerChoices[dateStr] === def.value) {
                btn.classList.add('active-' + def.value);
              }
              btn.addEventListener('click', function() {
                state.answerChoices[dateStr] = def.value;
                var siblings = group.getElementsByClassName('choice-btn');
                for (var b = 0; b < siblings.length; b++) {
                  siblings[b].classList.remove('active-ok', 'active-maybe', 'active-no');
                }
                btn.classList.add('active-' + def.value);
              });
              group.appendChild(btn);
            })(choiceDefs[j]);
          }

          dateRow.appendChild(group);
          datesEl.appendChild(dateRow);
        })(data.dates[i]);
      }
    }

    function submitAnswer() {
      var data = state.eventData;
      var name = state.joinName;

      for (var i = 0; i < data.dates.length; i++) {
        if (!state.answerChoices[data.dates[i]]) {
          toast('すべての日程に回答してください');
          return;
        }
      }

      var key = sanitizeKey(name);
      var answerPayload = {
        name: name,
        answers: state.answerChoices,
        comment: document.getElementById('answer-comment').value.trim(),
        answeredAt: Date.now()
      };

      if (!data.answers) { data.answers = {}; }
      data.answers[key] = answerPayload;

      var btn = document.getElementById('btn-submit-answer');
      btn.textContent = '送信中…';
      btn.disabled = true;

      saveEvent(data).then(function() {
        var localDb = loadDB();
        if (localDb[data.id]) { localDb[data.id] = data; saveDB(localDb); }
        state.eventData = data;
        toast('回答を送信しました');
        setTimeout(function() { go('guest'); }, 900);
      }).catch(function() {
        toast('送信に失敗しました');
        btn.textContent = '回答を送信する';
        btn.disabled = false;
      });
    }

    /* ===== SCORE CALCULATION ===== */
    function calcScores(data) {
      var answers = data.answers || {};
      var priorities = data.priorities || {};
      var keys = Object.keys(answers);
      var total = keys.length;
      var scores = {};
      var bestScore = -1;
      var bestDate = null;

      for (var i = 0; i < data.dates.length; i++) {
        var ds = data.dates[i];
        var okCnt = 0, mayCnt = 0, noCnt = 0, score = 0;
        var reqFail = false;

        for (var j = 0; j < keys.length; j++) {
          var aKey = keys[j];
          var aObj = answers[aKey];
          if (!aObj || !aObj.answers) { continue; }
          var choice = aObj.answers[ds];
          var prio = priorities[aKey] || 'normal';
          var mul = (prio === 'important') ? 3 : 1;

          if (choice === 'ok')         { okCnt++;  score += 2 * mul; }
          else if (choice === 'maybe') { mayCnt++; score += 1 * mul; }
          else if (choice === 'no')    { noCnt++;  if (prio === 'required') { reqFail = true; } }
        }

        scores[ds] = { ok: okCnt, maybe: mayCnt, no: noCnt, score: score, reqFail: reqFail, total: total };
        if (!reqFail && score > bestScore) { bestScore = score; bestDate = ds; }
      }

      var bestDates = [];
      if (bestDate !== null) {
        for (var d = 0; d < data.dates.length; d++) {
          var dds = data.dates[d];
          if (!scores[dds].reqFail && scores[dds].score === bestScore) { bestDates.push(dds); }
        }
      }

      return { scores: scores, bestDate: bestDate, bestDates: bestDates, bestScore: bestScore, total: total };
    }

    /* ===== RESULT MAIN ===== */
    function renderResult() {
      if (!state.eventData) { return; }
      var data = state.eventData;
      var scoreData = calcScores(data);
      state.resultSummary = buildSummaryText(data, scoreData);

      document.getElementById('result-header-title').textContent = data.name;
      document.getElementById('tab-btn-admin-inline').style.display = state.role === 'host' ? '' : 'none';

      renderResultTable(data, scoreData);
      renderResultBest(data, scoreData);
      renderResultComments(data);
      renderInlineAdmin(data);

      switchTab('table');
    }

    /* ===== TAB SWITCH ===== */
    function switchTab(name) {
      var tabIds = ['table', 'chart', 'best', 'comments', 'admin-inline'];
      for (var i = 0; i < tabIds.length; i++) {
        var t = tabIds[i];
        var btn = document.getElementById('tab-btn-' + t);
        var pane = document.getElementById('result-tab-' + t);
        if (btn) { btn.classList.remove('active'); }
        if (pane) { pane.style.display = 'none'; }
      }
      var activeBtn  = document.getElementById('tab-btn-' + name);
      var activePane = document.getElementById('result-tab-' + name);
      if (activeBtn)  { activeBtn.classList.add('active'); }
      if (activePane) { activePane.style.display = 'block'; }
      if (name === 'chart') { renderCharts(); }
    }

    /* ===== TABLE TAB ===== */
    function renderResultTable(data, scoreData) {
      var container = document.getElementById('result-tab-table');
      container.innerHTML = '';
      var isHost = state.role === 'host';
      var answers = data.answers || {};
      var answerKeys = Object.keys(answers);

      if (data.members && data.members.length > 0) {
        renderUnansweredCard(container, data, answerKeys);
      }

      var table = document.createElement('div');
      table.className = 'result-table';

      for (var i = 0; i < data.dates.length; i++) {
        var ds = data.dates[i];
        var s = scoreData.scores[ds];
        var isBest = scoreData.bestDates.indexOf(ds) !== -1;

        var row = document.createElement('div');
        row.className = 'result-row' +
          (isBest ? ' result-row-best' : '') +
          (s.reqFail ? ' result-row-ng' : '');

        var main = document.createElement('div');
        main.className = 'result-row-main';

        var dateDiv = document.createElement('div');
        dateDiv.className = 'result-date';
        dateDiv.appendChild(document.createTextNode(fmt(ds)));
        if (isBest) {
          var badge = document.createElement('span');
          badge.className = 'best-row-badge';
          badge.textContent = 'BEST';
          dateDiv.appendChild(badge);
        }
        main.appendChild(dateDiv);

        var counts = document.createElement('div');
        counts.className = 'result-counts';
        var ok = document.createElement('span');
        ok.className = 'result-ok';
        ok.textContent = '○' + s.ok;
        counts.appendChild(ok);
        var may = document.createElement('span');
        may.className = 'result-maybe';
        may.textContent = '△' + s.maybe;
        counts.appendChild(may);
        var no = document.createElement('span');
        no.className = 'result-no';
        no.textContent = '×' + s.no;
        counts.appendChild(no);
        main.appendChild(counts);

        if (isHost) {
          var scoreCell = document.createElement('div');
          scoreCell.className = 'result-score-cell' + (s.reqFail ? '' : ' tappable');
          scoreCell.textContent = s.reqFail ? 'NG' : (s.score + 'pt');
          if (!s.reqFail) {
            (function(dateStr) {
              scoreCell.addEventListener('click', function() { showScorePopup(dateStr); });
            })(ds);
          }
          main.appendChild(scoreCell);
        }

        row.appendChild(main);

        var bar = document.createElement('div');
        bar.className = 'heatmap-bar';
        if (s.total > 0) {
          var okBar = document.createElement('div');
          okBar.className = 'heatmap-ok';
          okBar.style.width = Math.round(s.ok / s.total * 100) + '%';
          bar.appendChild(okBar);

          mayBar.className = 'heatmap-maybe';
          mayBar.style.width = Math.round(s.maybe / s.total * 100) + '%';
          bar.appendChild(mayBar);

    function renderUnansweredCard(container, data, answerKeys) {
      var answers = data.answers || {};
      var members = data.members;
      var unanswered = [];
      for (var i = 0; i < members.length; i++) {
        if (!answers[sanitizeKey(members[i])]) { unanswered.push(members[i]); }
      }

      var card = document.createElement('div');
      card.className = 'unanswered-card';

      var status = document.createElement('div');
      status.className = 'unanswered-status';
      status.textContent = '登録 ' + members.length + '人　回答済み ' + answerKeys.length + '人　未回答 ' + unanswered.length + '人';
      card.appendChild(status);

      var chips = document.createElement('div');
      chips.className = 'tag-list';
      for (var j = 0; j < members.length; j++) {
        var m = members[j];
        var hasA = !!answers[sanitizeKey(m)];
        var chip = document.createElement('span');
        chip.className = 'member-status-chip ' + (hasA ? 'chip-answered' : 'chip-pending');
        chip.textContent = (hasA ? '✓ ' : '⏳ ') + m;

      card.appendChild(chips);
      container.appendChild(card);

    /* ===== CHART TAB ===== */
    function renderCharts() {
      var data = state.eventData;
      if (!data || typeof Chart === 'undefined') { return; }
      var scoreData = calcScores(data);

      var container = document.getElementById('result-tab-chart');
      container.innerHTML = '';

      var labels = [];
      for (var i = 0; i < data.dates.length; i++) { labels.push(fmt(data.dates[i])); }

      var okData = [], mayData = [], noData = [], okColors = [];
      for (var j = 0; j < data.dates.length; j++) {
        var ds = data.dates[j];
        var s = scoreData.scores[ds];
        okData.push(s.ok);
        mayData.push(s.maybe);
        noData.push(s.no);
        if (s.reqFail) { okColors.push('rgba(100,100,100,0.35)'); }
        else if (scoreData.bestDates.indexOf(ds) !== -1) { okColors.push('rgba(184,146,46,0.9)'); }
        else { okColors.push('rgba(184,146,46,0.38)'); }
      }

      if (state.chart)      { state.chart.destroy();      state.chart = null; }
      if (state.chartRatio) { state.chartRatio.destroy(); state.chartRatio = null; }

      var w1 = document.createElement('div');
      w1.className = 'chart-wrap';
      var l1 = document.createElement('div');
      l1.className = 'chart-label';
      l1.textContent = '○ 人数';
      w1.appendChild(l1);
      var c1 = document.createElement('canvas');
      c1.id = 'chart-ok';
      w1.appendChild(c1);
      container.appendChild(w1);

      var w2 = document.createElement('div');
      w2.className = 'chart-wrap';
      var l2 = document.createElement('div');
      l2.className = 'chart-label';
      l2.textContent = '○ △ × 内訳';
      w2.appendChild(l2);
      var c2 = document.createElement('canvas');
      c2.id = 'chart-ratio';
      w2.appendChild(c2);
      container.appendChild(w2);

      state.chart = new Chart(c1.getContext('2d'), {
        type: 'bar',
        data: { labels: labels, datasets: [{ label: '○人数', data: okData, backgroundColor: okColors, borderRadius: 4 }] },
        options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
      });

      state.chartRatio = new Chart(c2.getContext('2d'), {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [
            { label: '○', data: okData,  backgroundColor: 'rgba(26,158,117,0.85)',  borderRadius: 2 },
            { label: '△', data: mayData, backgroundColor: 'rgba(196,122,10,0.85)'   },
            { label: '×', data: noData,  backgroundColor: 'rgba(201,48,68,0.85)'    }
          ]
        },
        options: { responsive: true, scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true, ticks: { stepSize: 1 } } } }
      });
    }

    /* ===== SUMMARY TEXT ===== */
    function buildSummaryText(data, scoreData) {
      var lines = [];
      lines.push('【' + data.name + '】日程調整結果');
      if (data.memo) { lines.push(data.memo); }
      lines.push('回答者：' + scoreData.total + '人');
      lines.push('');
      for (var i = 0; i < data.dates.length; i++) {
        var ds = data.dates[i];
        var s = scoreData.scores[ds];
        var line = fmt(ds) + '\t○' + s.ok + ' △' + s.maybe + ' ×' + s.no;
        if (scoreData.bestDates.indexOf(ds) !== -1) { line += '  ⭐おすすめ'; }
        lines.push(line);
      }
      if (scoreData.bestDate) {
        var bs = scoreData.scores[scoreData.bestDate];
        lines.push('');
        lines.push('おすすめ：' + fmt(scoreData.bestDate) + '（○' + bs.ok + '人）');
      }
      if (data.confirmedDate) { lines.push('✅ 確定日：' + fmt(data.confirmedDate)); }
      return lines.join('\n');
    }

    /* ===== ADMIN HELPERS ===== */
    function buildAllNames(data) {
      var members = data.members || [];
      var answers = data.answers || {};
      var answerKeys = Object.keys(answers);
      var result = [];
      var seen = {};

      for (var i = 0; i < members.length; i++) {
        var mk = sanitizeKey(members[i]);
        if (!seen[mk]) {
          seen[mk] = true;
          result.push({ name: members[i], key: mk, hasAnswer: !!answers[mk] });
        }
      }
      for (var j = 0; j < answerKeys.length; j++) {
        var ak = answerKeys[j];
        if (!seen[ak]) {
          seen[ak] = true;
          result.push({ name: (answers[ak].name || ak), key: ak, hasAnswer: true });
        }
      }
      return result;
    }

    function buildPrioritySection(data) {
      var allNames = buildAllNames(data);
      var priorities = data.priorities || {};
      var card = document.createElement('div');
      card.className = 'priority-card';

      if (allNames.length === 0) {
        var empty = document.createElement('div');
        empty.style.padding = '16px';
        empty.style.color = 'var(--text3)';
        empty.style.fontSize = '13px';
        empty.textContent = '参加者が登録されていません';
        card.appendChild(empty);
        return card;
      }

      var optDefs = [
        { v: 'normal',    l: '⚪ 一般' },
        { v: 'important', l: '🟡 重要' },
        { v: 'required',  l: '🔴 必須' }
      ];

      for (var i = 0; i < allNames.length; i++) {
        var n = allNames[i];
        var row = document.createElement('div');
        row.className = 'priority-row';

        var nameDiv = document.createElement('div');
        nameDiv.className = 'priority-name';
        nameDiv.appendChild(document.createTextNode(n.name));
        if (!n.hasAnswer) {
          var tag = document.createElement('span');
          tag.className = 'unanswered-tag';
          tag.textContent = '未回答';
          nameDiv.appendChild(tag);
        }
        row.appendChild(nameDiv);

        var sel = document.createElement('select');
        sel.className = 'priority-select';
        sel.setAttribute('data-key', n.key);
        for (var o = 0; o < optDefs.length; o++) {
          var opt = document.createElement('option');
          opt.value = optDefs[o].v;
          opt.textContent = optDefs[o].l;
          sel.appendChild(opt);
        }
        sel.value = priorities[n.key] || 'normal';
        row.appendChild(sel);
        card.appendChild(row);
      }
      return card;
    }

    function saveAdminPriorities(data, prioCard, callback) {
      var selects = prioCard.getElementsByClassName('priority-select');
      var priorities = data.priorities || {};
      for (var i = 0; i < selects.length; i++) {
        priorities[selects[i].getAttribute('data-key')] = selects[i].value;
      }
      data.priorities = priorities;
      saveEvent(data).then(function() {
        state.eventData = data;
        var localDb = loadDB();
        if (localDb[data.id]) { localDb[data.id] = data; saveDB(localDb); }
        toast('優先度を保存しました');
        if (callback) { callback(); }
      }).catch(function() { toast('保存に失敗しました'); });
    }

    function resetEvent(data) {
      showModal(
        '回答をリセット',
        '全員の回答を削除します。この操作は取り消せません。',
        [
          { label: 'キャンセル' },
          { label: 'リセットする', primary: true, onClick: function() {
            data.answers = {};

              state.eventData = data;
              var localDb = loadDB();
              if (localDb[data.id]) { localDb[data.id] = data; saveDB(localDb); }
              toast('回答をリセットしました');
              go('host');
            }).catch(function() { toast('リセットに失敗しました'); });

        ]
      );
    }

    function wtGoTo(idx) {
      var hlArr = [];
      var prevHL = document.getElementsByClassName('wt-highlight');
      for (var i = 0; i < prevHL.length; i++) { hlArr.push(prevHL[i]); }
      for (var j = 0; j < hlArr.length; j++) { hlArr[j].classList.remove('wt-highlight'); }

      wtIndex = idx;
      var step = wtSteps[idx];

      go(step.screen);

      document.getElementById('wt-step-ind').textContent = 'STEP ' + (idx + 1) + ' / ' + wtSteps.length;
      document.getElementById('wt-title').textContent = step.title;
      document.getElementById('wt-desc').textContent = step.desc;
      var nextBtn = document.getElementById('wt-next-btn');
      if (nextBtn) { nextBtn.textContent = (idx === wtSteps.length - 1) ? 'はじめる' : '次へ'; }

      if (step.targetId) {
        setTimeout(function() {
          var target = document.getElementById(step.targetId);
          if (target) { target.classList.add('wt-highlight'); }
        }, 60);
      }
    }

      var hlArr = [];
      var prevHL = document.getElementsByClassName('wt-highlight');
      for (var i = 0; i < prevHL.length; i++) { hlArr.push(prevHL[i]); }
      for (var j = 0; j < hlArr.length; j++) { hlArr[j].classList.remove('wt-highlight'); }

      go('home');
    }

          desc: '優先度設定で重要なメンバーを\n考慮した最適日を表示。' }
      ];

      for (var i = 0; i < slideDefs.length; i++) {
        (function(def, idx) {
          var slide = document.createElement('div');
          slide.className = 'ob-slide';
          slide.style.cursor = 'pointer';

          var icon = document.createElement('div');
          icon.className = 'ob-icon';
          icon.textContent = def.icon;
          slide.appendChild(icon);

          var stepNum = document.createElement('div');
          stepNum.className = 'ob-step-num';
          stepNum.textContent = def.step;
          slide.appendChild(stepNum);

          var title = document.createElement('div');
          title.className = 'ob-title';

          });

        })(slideDefs[i], i);

      wrap.addEventListener('touchstart', function(e) {
        obTouchStartX = e.touches[0].clientX;
      });

        var dx = e.changedTouches[0].clientX - obTouchStartX;
        if (Math.abs(dx) < 50) { return; }
        if (dx < 0 && obIndex < 3) { obGoTo(obIndex + 1); }
        else if (dx > 0 && obIndex > 1) { obGoTo(obIndex - 1); }

      ob.classList.add('active');
      obIndex = 0;

        if (obIndex === 0) { obGoTo(1); }
      }, 2000);
    }

    function obResetAnim(slideEl) {
      var targets = ['ob-icon', 'ob-title', 'ob-desc'];
      for (var t = 0; t < targets.length; t++) {
        var els = slideEl.getElementsByClassName(targets[t]);
        for (var e = 0; e < els.length; e++) {
          els[e].style.animation = 'none';
          els[e].offsetHeight;
          els[e].style.animation = '';
        }
      }
    }

    function obGoTo(idx) {
      obIndex = idx;
      var slider = document.getElementById('ob-slider');
      if (slider) {
        slider.style.transform = 'translateX(' + (-idx * 100) + '%)';
        var slides = slider.getElementsByClassName('ob-slide');
        if (slides[idx]) { obResetAnim(slides[idx]); }
      }

      var dotsEl = document.getElementById('ob-dots');
      var skipBtn = document.getElementById('ob-skip');

      var nextBtnEl = document.getElementById('ob-next-btn');

      if (idx === 0) {
        if (dotsEl) { dotsEl.style.visibility = 'hidden'; }
        if (skipBtn) { skipBtn.style.visibility = 'hidden'; }
        if (nextBtnEl) { nextBtnEl.style.visibility = 'hidden'; }
      } else {
        if (dotsEl) {
          dotsEl.style.visibility = 'visible';
          var dots = dotsEl.getElementsByClassName('ob-dot');
          for (var i = 0; i < dots.length; i++) {
            dots[i].classList.remove('active');
            if (i === idx - 1) { dots[i].classList.add('active'); }
          }
        }
        if (skipBtn) {
          skipBtn.style.visibility = (idx < 3) ? 'visible' : 'hidden';
        }
        if (nextBtnEl) {
          nextBtnEl.style.visibility = 'visible';
          nextBtnEl.textContent = (idx < 3) ? '次へ →' : 'はじめる';
        }
      }
    }

    /* ===== SCORE POPUP ===== */
    function showScorePopup(dateStr) {
      var data = state.eventData;
      if (!data) { return; }

      var inner = document.getElementById('score-popup-inner');
      inner.innerHTML = '';

      /* handle */
      var handle = document.createElement('div');
      handle.className = 'popup-handle';
      inner.appendChild(handle);

      /* header */
      var header = document.createElement('div');
      header.className = 'popup-header';
      var dateLabel = document.createElement('div');
      dateLabel.className = 'popup-date';
      dateLabel.textContent = fmt(dateStr) + ' スコア内訳';
      header.appendChild(dateLabel);
      var closeBtn = document.createElement('button');
      closeBtn.type = 'button';
      closeBtn.className = 'popup-close-btn';
      closeBtn.textContent = '✕';
      closeBtn.addEventListener('click', hideScorePopup);
      header.appendChild(closeBtn);
      inner.appendChild(header);

      /* rows */
      var answers = data.answers || {};
      var priorities = data.priorities || {};
      var keys = Object.keys(answers);
      var totalScore = 0;
      var formulaParts = [];
      var reqFailNames = [];

      for (var i = 0; i < keys.length; i++) {
        var aKey = keys[i];
        var aObj = answers[aKey];
        if (!aObj || !aObj.answers) { continue; }

        var choice = aObj.answers[dateStr];
        if (!choice) { continue; }

        var prio = priorities[aKey] || 'normal';
        var mul = (prio === 'important') ? 3 : 1;
        var pts = 0;
        if (choice === 'ok')         { pts = 2 * mul; }
        else if (choice === 'maybe') { pts = 1 * mul; }
        else if (choice === 'no' && prio === 'required') { reqFailNames.push(aObj.name || aKey); }

        totalScore += pts;
        var choiceSym = (choice === 'ok') ? '○' : (choice === 'maybe' ? '△' : '×');
        var prioSuffix = (prio === 'important') ? '×重要' : (prio === 'required' ? ' 必須' : '');
        var displayName = aObj.name || aKey;
        if (pts > 0) {
          formulaParts.push(displayName + '(+' + pts + ' ' + choiceSym + prioSuffix + ')');
        } else if (choice === 'no') {
          formulaParts.push(displayName + '(0 ×)');
        }

        var row = document.createElement('div');
        row.className = 'score-row';

        /* name + priority badge */
        var nameDiv = document.createElement('div');
        nameDiv.className = 'score-row-name';
        var nameSpan = document.createElement('span');
        nameSpan.textContent = aObj.name || aKey;
        nameDiv.appendChild(nameSpan);
        var prioBadge = document.createElement('span');
        prioBadge.className = 'prio-badge prio-' + prio;
        if (prio === 'required')    { prioBadge.textContent = '🔴 必須'; }
        else if (prio === 'important') { prioBadge.textContent = '🟡 重要'; }
        else                        { prioBadge.textContent = '⚪ 一般'; }
        nameDiv.appendChild(prioBadge);
        row.appendChild(nameDiv);

        /* choice + pts */
        var rightDiv = document.createElement('div');
        rightDiv.className = 'score-row-right';

        var choiceEl = document.createElement('span');
        choiceEl.className = 'score-choice';
        if (choice === 'ok')         { choiceEl.textContent = '○'; choiceEl.style.color = 'var(--ok)'; }
        else if (choice === 'maybe') { choiceEl.textContent = '△'; choiceEl.style.color = 'var(--maybe)'; }
        else                         { choiceEl.textContent = '×'; choiceEl.style.color = 'var(--no)'; }
        rightDiv.appendChild(choiceEl);

        var ptsEl = document.createElement('span');
        ptsEl.className = 'score-pts' + (pts === 0 ? ' zero' : '');
        ptsEl.textContent = '+' + pts + 'pt';
        rightDiv.appendChild(ptsEl);

        row.appendChild(rightDiv);
        inner.appendChild(row);
      }

      /* divider */
      var divider = document.createElement('div');
      divider.className = 'score-divider';
      inner.appendChild(divider);

      /* total */
      var totalWrap = document.createElement('div');

      var totalRow = document.createElement('div');
      totalRow.className = 'score-total-row';

      var labelWrap = document.createElement('div');
      var totalLabel = document.createElement('div');
      totalLabel.className = 'score-total-label';
      totalLabel.textContent = '合計スコア';
      labelWrap.appendChild(totalLabel);
      if (formulaParts.length > 0) {
        var formulaEl = document.createElement('div');
        formulaEl.className = 'score-formula';
        formulaEl.textContent = formulaParts.join(' + ');
        labelWrap.appendChild(formulaEl);
      }
      totalRow.appendChild(labelWrap);

      var totalVal = document.createElement('div');
      totalVal.className = 'score-total-val';
      totalVal.textContent = totalScore + 'pt';
      totalRow.appendChild(totalVal);

      totalWrap.appendChild(totalRow);
      inner.appendChild(totalWrap);

      /* reqFail warning */
      if (reqFailNames.length > 0) {
        var warn = document.createElement('div');
        warn.className = 'score-warn';
        warn.textContent = '⚠️ 必須メンバー（' + reqFailNames.join('、') + '）が × のため、この日は最適日から除外されます';
        inner.appendChild(warn);
      }

      document.getElementById('score-popup').classList.add('active');
    }

    function hideScorePopup() {
      document.getElementById('score-popup').classList.remove('active');
    }
  </script>
</body>
</html>
