<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>にちかん — 日程調整を、かしこく。</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    /* ===== CSS VARIABLES ===== */
    :root {
      --bg0: #F0EEE9;
      --bg1: #F7F6F2;
      --bg2: #FFFFFF;
      --bg3: #F4F2EE;
      --bg4: #FFFFFF;
      --border: rgba(0,0,0,0.08);
      --border-gold: rgba(180,140,40,0.2);
      --text: #0F0E0C;
      --text2: #6B6560;
      --text3: #9E9890;
      --gold: #b8922e;
      --gold2: #d4aa50;
      --ok: #1a9e75;
      --maybe: #c47a0a;
      --no: #c93044;
      --ok-bg: rgba(26,158,117,.08);
      --maybe-bg: rgba(196,122,10,.08);
      --no-bg: rgba(201,48,68,.08);
      --shadow-card: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.05);
      --radius: 14px;
      --radius-sm: 8px;
      --font-mono: 'JetBrains Mono', monospace;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg0: #080a0f;
        --bg1: #0d1017;
        --bg2: #141820;
        --bg3: #1c2130;
        --bg4: #232b3a;
        --border: rgba(255,255,255,0.06);
        --border-gold: rgba(201,168,76,0.18);
        --text: #eceae4;
        --text2: #8a8070;
        --text3: #5a5248;
        --gold: #c9a84c;
        --gold2: #e8c96a;
        --ok: #2dd4a0;
        --maybe: #f5a623;
        --no: #f05c6e;
        --ok-bg: rgba(45,212,160,.1);
        --maybe-bg: rgba(245,166,35,.1);
        --no-bg: rgba(240,92,110,.1);
        --shadow-card: 0 1px 0 rgba(201,168,76,.07), 0 4px 24px rgba(0,0,0,.45);
      }
    }

    /* ===== BASE ===== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      background: var(--bg0);
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    /* ===== SCREEN SYSTEM ===== */
    .screen {
      display: none;
      min-height: 100dvh;
      background: var(--bg0);
    }

    .screen.active {
      display: block;
    }

    /* ===== HEADER ===== */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg1);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--gold);
      letter-spacing: -0.02em;
    }

    .header-title {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .back-btn {
      background: none;
      border: none;
      color: var(--text2);
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px 4px 0;
      line-height: 1;
      flex-shrink: 0;
    }

    /* ===== CONTENT WRAPPER ===== */
    .content {
      padding: 24px 20px;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ===== TOAST ===== */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg4);
      color: var(--text);
      padding: 10px 22px;
      border-radius: 999px;
      box-shadow: var(--shadow-card);
      font-size: 14px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s, transform 0.22s;
      z-index: 9999;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ===== CUSTOM MODAL ===== */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1100;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
    }

    #modal-overlay.active {
      display: flex;
    }

    .modal-box {
      background: var(--bg2);
      border-radius: var(--radius);
      padding: 24px;
      max-width: 320px;
      width: calc(100% - 40px);
      box-shadow: var(--shadow-card);
    }

    .modal-title {
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 8px;
      color: var(--text);
    }

    .modal-msg {
      color: var(--text2);
      font-size: 14px;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    /* ===== ONBOARDING ===== */
    #onboarding {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 2000;
      background: var(--bg0);
      flex-direction: column;
    }

    #onboarding.active {
      display: flex;
    }

    /* ===== WALKTHROUGH ===== */
    #walkthrough {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 900;
      background: rgba(0,0,0,0.72);
    }

    #walkthrough.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
    }

    /* ===== SCORE POPUP ===== */
    #score-popup {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 800;
      background: rgba(0,0,0,0.5);
      align-items: flex-end;
    }

    #score-popup.active {
      display: flex;
    }

    #score-popup-inner {
      background: var(--bg2);
      width: 100%;
      max-height: 70vh;
      overflow-y: auto;
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 24px;
    }

    /* ===== HOME SCREEN ===== */
    #screen-home {
      position: relative;
      overflow: hidden;
    }

    /* ダークモード背景グロー */
    .home-bg-glow {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 55%;
      pointer-events: none;
      z-index: 0;
    }

    @media (prefers-color-scheme: dark) {
      .home-bg-glow {
        display: block;
        background: radial-gradient(ellipse 80% 60% at 50% -10%, rgba(201,168,76,0.18) 0%, transparent 70%);
      }
    }

    /* PCグリッドオーバーレイ */
    .home-bg-grid {
      display: none;
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    @media (min-width: 640px) {
      .home-bg-grid {
        display: block;
        background-image:
          linear-gradient(rgba(184,146,46,0.06) 1px, transparent 1px),
          linear-gradient(90deg, rgba(184,146,46,0.06) 1px, transparent 1px);
        background-size: 48px 48px;
      }
    }

    /* メインレイアウト */
    .home-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 48px 24px 24px;
      text-align: center;
    }

    @media (min-width: 640px) {
      .home-inner {
        flex-direction: row;
        align-items: center;
        justify-content: center;
        gap: 64px;
        max-width: 900px;
        margin: 0 auto;
        padding: 0 48px;
        text-align: left;
      }
    }

    /* ヒーロー左カラム */
    .home-hero {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    @media (min-width: 640px) {
      .home-hero {
        flex: 1.2;
        align-items: flex-start;
      }
    }

    /* ロゴ */
    .home-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 56px;
      color: var(--gold);
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 12px;
    }

    @media (min-width: 640px) {
      .home-logo { font-size: 72px; margin-bottom: 16px; }
    }

    /* タグライン */
    .home-tagline {
      font-size: 14px;
      color: var(--gold2);
      letter-spacing: 0.08em;
      margin-bottom: 24px;
      font-weight: 500;
    }

    @media (prefers-color-scheme: dark) {
      .home-tagline { color: var(--gold); }
    }

    /* ロゴ下グロードット（スマホのみ） */
    .home-glow-dots {
      display: flex;
      gap: 6px;
      margin-bottom: 36px;
    }

    .home-glow-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0.35;
    }

    .home-glow-dot.active {
      opacity: 1;
      box-shadow: 0 0 8px var(--gold), 0 0 2px var(--gold);
    }

    @media (min-width: 640px) {
      .home-glow-dots { display: none; }
    }

    /* PC用機能説明リスト */
    .home-features-list {
      display: none;
    }

    @media (min-width: 640px) {
      .home-features-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        list-style: none;
        margin-bottom: 32px;
      }

      .home-features-list li {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
        color: var(--text2);
        line-height: 1.5;
      }

      .home-features-list li::before {
        content: '';
        display: inline-block;
        width: 18px;
        height: 1px;
        background: var(--gold);
        flex-shrink: 0;
        opacity: 0.6;
      }
    }

    /* カード右カラム */
    .home-cards {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 340px;
    }

    @media (min-width: 640px) {
      .home-cards {
        flex: 1;
        max-width: 320px;
      }
    }

    /* 役割カード共通 */
    .role-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      cursor: pointer;
      box-shadow: var(--shadow-card);
      transition: transform 0.14s, box-shadow 0.14s;
      text-align: left;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    .role-btn::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }

    .role-btn:active { transform: scale(0.97); }

    /* 主催者カード：ゴールド */
    .role-btn-host {
      border-top-color: rgba(184,146,46,0.35);
    }

    .role-btn-host::before {
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .role-btn-host:hover {
      box-shadow: var(--shadow-card), 0 0 20px rgba(184,146,46,0.12);
    }

    /* 参加者カード：ブルー */
    .role-btn-guest {
      border-top-color: rgba(79,163,232,0.35);
    }

    .role-btn-guest::before {
      background: linear-gradient(90deg, transparent, #4fa3e8, transparent);
    }

    .role-btn-guest:hover {
      box-shadow: var(--shadow-card), 0 0 20px rgba(79,163,232,0.12);
    }

    @media (prefers-color-scheme: dark) {
      .role-btn-host {
        border-top-color: rgba(201,168,76,0.4);
        background-image: linear-gradient(to bottom, rgba(201,168,76,0.09) 0px, transparent 40px);
      }
      .role-btn-host:hover {
        box-shadow: var(--shadow-card), 0 0 28px rgba(201,168,76,0.18);
      }
      .role-btn-guest {
        border-top-color: rgba(79,163,232,0.35);
        background-image: linear-gradient(to bottom, rgba(79,163,232,0.08) 0px, transparent 40px);
      }
      .role-btn-guest:hover {
        box-shadow: var(--shadow-card), 0 0 28px rgba(79,163,232,0.16);
      }
    }

    .role-icon { font-size: 28px; flex-shrink: 0; }

    .role-label {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 3px;
    }

    .role-desc { font-size: 12px; color: var(--text2); margin-bottom: 10px; }

    .role-features {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .role-feature-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      color: var(--gold);
      background: rgba(184,146,46,0.08);
      border: 1px solid rgba(184,146,46,0.2);
      border-radius: 4px;
      padding: 2px 6px;
      letter-spacing: 0.02em;
    }

    .role-btn-guest .role-feature-tag {
      color: #4fa3e8;
      background: rgba(79,163,232,0.08);
      border-color: rgba(79,163,232,0.2);
    }

    @media (prefers-color-scheme: dark) {
      .role-feature-tag {
        background: rgba(201,168,76,0.1);
        border-color: rgba(201,168,76,0.22);
      }
      .role-btn-guest .role-feature-tag {
        background: rgba(79,163,232,0.1);
        border-color: rgba(79,163,232,0.22);
      }
      .menu-card,
      .cal-wrap,
      .event-list-card {
        background-image: linear-gradient(to bottom, rgba(201,168,76,0.1) 0px, rgba(201,168,76,0) 3px);
        border-top-color: rgba(201,168,76,0.28);
      }
    }

    /* ===== MENU CARDS ===== */
    .menu-list {
      display: flex;
      flex-direction: column;
      gap: 0;
      padding: 24px 20px;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ===== FORM ===== */
    .content {
      padding: 24px 20px 40px;
      max-width: 480px;
      margin: 0 auto;
    }

    .form-group { margin-bottom: 22px; }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--text2);
      margin-bottom: 8px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .required { color: var(--no); }

    .form-input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-size: 16px;
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      outline: none;
      -webkit-appearance: none;
      transition: border-color 0.15s;
    }

    .form-input:focus { border-color: var(--gold); }

    .form-textarea {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-size: 15px;
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      outline: none;
      resize: vertical;
      min-height: 80px;
      -webkit-appearance: none;
      transition: border-color 0.15s;
    }

    .form-textarea:focus { border-color: var(--gold); }

    #answer-comment:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(184,146,46,0.12);
    }

    @media (prefers-color-scheme: dark) {
      #answer-comment:focus {
        box-shadow: 0 0 0 3px rgba(201,168,76,0.16);
      }
    }

    .form-hint {
      font-size: 11px;
      color: var(--text3);
      text-align: right;
      margin-top: 4px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ===== MEMBER INPUT ===== */
    .member-input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .member-input-row .form-input { flex: 1; }

    .add-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      padding: 0 16px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .add-btn:active { opacity: 0.7; }

    /* ===== TAGS ===== */
    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .member-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 5px 12px;
      font-size: 13px;
      color: var(--text);
    }

    .date-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--ok-bg);
      border: 1px solid rgba(26,158,117,.2);
      border-radius: 999px;
      padding: 5px 12px;
      color: var(--ok);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
    }

    .date-tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .tag-x {
      cursor: pointer;
      color: var(--text3);
      font-size: 14px;
      line-height: 1;
      padding: 0 2px;
    }

    .tag-x:hover { color: var(--no); }

    /* ===== CALENDAR ===== */
    .cal-wrap {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow-card);
    }

    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .cal-nav-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 22px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .cal-nav-btn:active { opacity: 0.7; }

    .cal-month-label {
      font-family: 'DM Serif Display', serif;
      font-size: 18px;
      color: var(--text);
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .cal-header-cell {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      text-align: center;
      padding: 4px 0;
      color: var(--text3);
    }

    .cal-cell {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-size: 14px;
    }

    .cal-day {
      cursor: pointer;
      color: var(--text);
      font-weight: 500;
      transition: background 0.1s;
    }

    .cal-day:hover { background: var(--bg3); }
    .cal-day:active { opacity: 0.7; }
    .cal-sun { color: var(--no); }
    .cal-sat { color: #4fa3e8; }

    .cal-past {
      color: var(--text3);
      cursor: not-allowed;
      opacity: 0.38;
    }

    .cal-selected {
      background: var(--gold) !important;
      color: #fff !important;
      font-weight: 700;
    }

    /* ===== PRIMARY BUTTON ===== */
    .primary-btn {
      display: block;
      width: 100%;
      background: var(--gold);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.15s;
    }

    .primary-btn:active { opacity: 0.85; }

    .secondary-btn {
      display: block;
      width: 100%;
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      margin-top: 8px;
    }

    .secondary-btn:active { opacity: 0.75; }

    /* ===== CREATED SCREEN ===== */
    .created-id-card {
      background: var(--bg2);
      border: 1px solid var(--border-gold);
      border-radius: var(--radius);
      padding: 28px 24px 20px;
      text-align: center;
      box-shadow: var(--shadow-card);
      margin-bottom: 14px;
    }

    .created-card-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .created-id-value {
      font-family: 'DM Serif Display', serif;
      font-size: 52px;
      color: var(--gold);
      letter-spacing: 0.14em;
      line-height: 1;
      margin-bottom: 6px;
    }

    .created-event-name {
      font-size: 14px;
      color: var(--text2);
      margin-bottom: 18px;
    }

    .copy-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
      font-family: 'Noto Sans JP', sans-serif;
      padding: 8px 18px;
      cursor: pointer;
    }

    .copy-btn:active { opacity: 0.7; }

    .share-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: var(--shadow-card);
    }

    .share-card-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text3);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .share-url-box {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text2);
      word-break: break-all;
      background: var(--bg3);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      margin-bottom: 10px;
    }

    .info-row {
      font-size: 13px;
      color: var(--text2);
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }

    .info-row:last-child { border-bottom: none; }

    .info-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px 16px;
      margin-bottom: 14px;
      box-shadow: var(--shadow-card);
    }

    /* ===== ID入力フィールド共通 ===== */
    #join-id, #result-id, #admin-id {
      text-transform: uppercase;
      letter-spacing: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px;
      text-align: center;
      padding-left: 8px;
    }

    /* ===== JOIN SCREEN ===== */

    .join-event-card {
      background: var(--bg2);
      border: 1.5px solid var(--gold2);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-card), 0 0 0 1px rgba(184,146,46,0.08);
    }

    @media (prefers-color-scheme: dark) {
      .join-event-card {
        border-color: rgba(201,168,76,0.4);
        box-shadow: var(--shadow-card), 0 0 16px rgba(201,168,76,0.08);
      }
    }

    .join-event-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .join-event-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }

    .join-event-meta {
      font-size: 12px;
      color: var(--text3);
    }

    .member-chip {
      background: rgba(184,146,46,0.06);
      border: 1.5px solid rgba(184,146,46,0.2);
      border-radius: 999px;
      padding: 7px 14px;
      font-size: 14px;
      color: var(--text);
      cursor: pointer;
      font-family: 'Noto Sans JP', sans-serif;
      transition: background 0.1s, border-color 0.1s;
    }

    .member-chip.answered {
      background: rgba(184,146,46,0.12);
      border-color: rgba(184,146,46,0.4);
      color: var(--gold);
    }

    .member-chip.selected {
      background: var(--gold);
      border-color: var(--gold);
      color: #fff;
      box-shadow: 0 0 10px rgba(184,146,46,0.3);
    }

    @media (prefers-color-scheme: dark) {
      .member-chip {
        background: rgba(201,168,76,0.07);
        border-color: rgba(201,168,76,0.22);
      }
      .member-chip.answered {
        background: rgba(201,168,76,0.13);
        border-color: rgba(201,168,76,0.4);
        color: var(--gold);
      }
      .member-chip.selected {
        box-shadow: 0 0 14px rgba(201,168,76,0.35);
      }
    }

    /* ===== ANSWER SCREEN ===== */
    .respondent-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding: 12px 16px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-card);
    }

    .respondent-name {
      font-weight: 700;
      font-size: 16px;
      color: var(--text);
    }

    .answer-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 999px;
      letter-spacing: 0.04em;
    }

    .badge-new {
      background: var(--ok-bg);
      color: var(--ok);
    }

    .badge-edit {
      background: var(--maybe-bg);
      color: var(--maybe);
    }

    .answer-dates-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0 16px;
      box-shadow: var(--shadow-card);
    }

    .answer-date-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }

    .answer-date-row:last-child { border-bottom: none; }

    .answer-date-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      flex: 1;
      letter-spacing: 0.02em;
    }

    .choice-group { display: flex; gap: 8px; }

    .choice-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--bg3);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s, box-shadow 0.15s;
      font-family: 'Noto Sans JP', sans-serif;
      flex-shrink: 0;
    }

    .choice-btn:active { transform: scale(0.88); }

    .choice-ok    { color: var(--ok); }
    .choice-maybe { color: var(--maybe); }
    .choice-no    { color: var(--no); }

    .active-ok {
      background: var(--ok);
      border-color: var(--ok);
      color: #fff;
      box-shadow: 0 0 14px rgba(26,158,117,.5), 0 0 4px rgba(26,158,117,.3);
    }
    .active-maybe {
      background: var(--maybe);
      border-color: var(--maybe);
      color: #fff;
      box-shadow: 0 0 14px rgba(196,122,10,.5), 0 0 4px rgba(196,122,10,.3);
    }
    .active-no {
      background: var(--no);
      border-color: var(--no);
      color: #fff;
      box-shadow: 0 0 14px rgba(201,48,68,.5), 0 0 4px rgba(201,48,68,.3);
    }

    @media (prefers-color-scheme: dark) {
      .active-ok    { box-shadow: 0 0 18px rgba(45,212,160,.55), 0 0 6px rgba(45,212,160,.3); }
      .active-maybe { box-shadow: 0 0 18px rgba(245,166,35,.55), 0 0 6px rgba(245,166,35,.3); }
      .active-no    { box-shadow: 0 0 18px rgba(240,92,110,.55), 0 0 6px rgba(240,92,110,.3); }
    }

    /* ===== TAB BAR ===== */
    .tab-bar {
      display: flex;
      background: var(--bg1);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .tab-bar::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex-shrink: 0;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text3);
      cursor: pointer;
      font-family: 'Noto Sans JP', sans-serif;
      white-space: nowrap;
      transition: color 0.15s;
    }

    .tab-btn.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
      font-weight: 700;
    }

    .result-tab {
      padding: 16px 16px 48px;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ===== RESULT TABLE ===== */
    .result-table {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-card);
      margin-bottom: 14px;
    }

    .result-row {
      padding: 11px 14px 8px;
      border-bottom: 1px solid var(--border);
    }
    .result-row:last-child { border-bottom: none; }
    .result-row-best {
      background: rgba(184,146,46,.11);
      border-left: 3px solid var(--gold);
      padding-left: 11px;
    }

    @media (prefers-color-scheme: dark) {
      .result-row-best {
        background: rgba(201,168,76,.13);
        border-left-color: var(--gold2);
      }
    }
    .result-row-ng   { opacity: 0.42; }

    .result-row-main {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .result-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--text);
      flex: 1;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .best-row-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 600;
      background: var(--gold);
      color: #fff;
      padding: 2px 5px;
      border-radius: 3px;
    }

    .result-counts {
      display: flex;
      gap: 9px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 600;
    }

    .result-ok    { color: var(--ok); }
    .result-maybe { color: var(--maybe); }
    .result-no    { color: var(--no); }

    .result-score-cell {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text3);
      min-width: 36px;
      text-align: right;
    }

    .result-score-cell.tappable { cursor: pointer; color: var(--gold); }

    .heatmap-bar {
      height: 4px;
      border-radius: 2px;
      background: var(--no-bg);
      overflow: hidden;
      display: flex;
    }

    .heatmap-ok    { height: 100%; background: var(--ok); }
    .heatmap-maybe { height: 100%; background: var(--maybe); }

    /* ===== UNANSWERED CARD ===== */
    .unanswered-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 14px;
      box-shadow: var(--shadow-card);
    }

    .unanswered-status {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text3);
      margin-bottom: 10px;
    }

    .chip-answered {
      background: rgba(26,158,117,.14);
      color: var(--ok);
      border: 1px solid rgba(26,158,117,.3);
      font-weight: 600;
    }
    .chip-pending {
      background: rgba(201,48,68,.1);
      color: var(--no);
      border: 1px solid rgba(201,48,68,.25);
      font-weight: 600;
    }

    @media (prefers-color-scheme: dark) {
      .chip-answered {
        background: rgba(45,212,160,.13);
        border-color: rgba(45,212,160,.3);
      }
      .chip-pending {
        background: rgba(240,92,110,.1);
        border-color: rgba(240,92,110,.25);
      }
    }

    .member-status-chip {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
    }

    /* ===== OPTIMAL CARD ===== */
    .optimal-card {
      background: var(--bg2);
      border: 1.5px solid var(--gold2);
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
      box-shadow: var(--shadow-card), 0 0 0 1px rgba(184,146,46,0.06);
      margin-bottom: 14px;
    }

    @media (prefers-color-scheme: dark) {
      .optimal-card {
        border-color: rgba(201,168,76,0.4);
        box-shadow: var(--shadow-card), 0 0 20px rgba(201,168,76,0.08);
      }
    }

    .optimal-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .optimal-date-value {
      font-family: 'DM Serif Display', serif;
      font-size: 38px;
      color: var(--gold);
      letter-spacing: -0.01em;
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .optimal-counts {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      color: var(--text2);
      margin-bottom: 4px;
    }

    .optimal-score {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text3);
    }

    .confirmed-banner {
      background: linear-gradient(135deg, rgba(26,158,117,.18) 0%, rgba(26,158,117,.07) 100%);
      border: 1.5px solid rgba(26,158,117,.45);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
      font-weight: 700;
      font-size: 15px;
      color: var(--ok);
      margin-bottom: 12px;
      box-shadow: 0 0 16px rgba(26,158,117,.12);
      letter-spacing: 0.02em;
    }

    @media (prefers-color-scheme: dark) {
      .confirmed-banner {
        background: linear-gradient(135deg, rgba(45,212,160,.16) 0%, rgba(45,212,160,.06) 100%);
        border-color: rgba(45,212,160,.4);
        box-shadow: 0 0 20px rgba(45,212,160,.14);
      }
    }

    /* ===== CHART ===== */
    .chart-wrap {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: var(--shadow-card);
    }

    .chart-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    /* ===== COMMENTS ===== */
    .comment-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
      box-shadow: var(--shadow-card);
    }

    .comment-name {
      font-weight: 700;
      font-size: 13px;
      color: var(--text);
      margin-bottom: 4px;
    }

    .comment-text {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .no-content {
      text-align: center;
      color: var(--text3);
      font-size: 14px;
      padding: 48px 0;
    }

    /* ===== ADMIN / PRIORITY ===== */
    .priority-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-card);
      margin-bottom: 14px;
    }

    .priority-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }

    .priority-row:last-child { border-bottom: none; }

    .priority-name {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--text);
      flex: 1;
      min-width: 0;
    }

    .unanswered-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text3);
      background: var(--bg3);
      padding: 2px 6px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .priority-select {
      background: var(--bg3);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 13px;
      font-family: 'Noto Sans JP', sans-serif;
      padding: 7px 10px;
      outline: none;
      -webkit-appearance: none;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.15s;
    }

    .priority-select:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(184,146,46,0.12);
    }

    @media (prefers-color-scheme: dark) {
      .priority-select:focus {
        box-shadow: 0 0 0 3px rgba(201,168,76,0.16);
      }
    }

    .danger-btn {
      display: block;
      width: 100%;
      background: none;
      border: 1.5px solid var(--no);
      border-radius: var(--radius);
      color: var(--no);
      font-size: 14px;
      font-weight: 700;
      font-family: 'Noto Sans JP', sans-serif;
      padding: 13px;
      cursor: pointer;
      margin-top: 8px;
    }

    .danger-btn:active { opacity: 0.7; }

    .date-confirm-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 14px;
    }

    .date-confirm-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--text);
      text-align: left;
      width: 100%;
    }

    .date-confirm-btn.confirmed {
      border-color: var(--ok);
      background: var(--ok-bg);
      color: var(--ok);
    }

    /* ===== ONBOARDING ===== */
    .ob-slider-wrap {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .ob-slider {
      display: flex;
      height: 100%;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform;
    }

    .ob-slide {
      min-width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 36px;
      text-align: center;
    }

    /* slide 0: splash */
    .ob-splash-logo {
      font-family: 'DM Serif Display', serif;
      font-size: 56px;
      color: var(--gold);
      letter-spacing: -0.02em;
      animation: obBounceIn 0.9s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
    }

    .ob-splash-tagline {
      font-size: 14px;
      color: var(--text3);
      letter-spacing: 0.06em;
      margin-top: 14px;
      animation: obFadeUp 0.7s 0.5s ease-out both;
    }

    @keyframes obLogoIn {
      from { opacity: 0; transform: scale(0.82); }
      to   { opacity: 1; transform: scale(1); }
    }

    @keyframes obBounceIn {
      0%   { opacity: 0; transform: scale(0.55); }
      55%  { opacity: 1; transform: scale(1.1); }
      75%  { transform: scale(0.94); }
      90%  { transform: scale(1.03); }
      100% { transform: scale(1); }
    }

    @keyframes obFadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes obFadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .ob-icon {
      animation: obBounceIn 0.65s ease-out both;
    }

    .ob-title {
      animation: obFadeUp 0.5s 0.1s ease-out both;
    }

    .ob-desc {
      animation: obFadeUp 0.5s 0.2s ease-out both;
    }

    .ob-start-btn {
      animation: obFadeUp 0.5s 0.3s ease-out both;
    }

    /* slides 1-3 */
    .ob-icon {
      font-size: 56px;
      margin-bottom: 20px;
    }

    .ob-step-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--gold);
      letter-spacing: 0.16em;
      margin-bottom: 12px;
    }

    .ob-title {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      color: var(--text);
      line-height: 1.35;
      margin-bottom: 16px;
      white-space: pre-line;
    }

    .ob-desc {
      font-size: 15px;
      color: var(--text2);
      line-height: 1.75;
      white-space: pre-line;
    }

    .ob-start-btn {
      display: block;
      margin: 32px auto 0;
      background: var(--gold);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 16px 48px;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .ob-start-btn:active { opacity: 0.85; }

    /* 外部配置の次へ/はじめるボタン */
    .ob-next-btn {
      display: block;
      margin: 0 auto 20px;
      background: var(--gold);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 14px 48px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.12s;
      min-width: 200px;
      text-align: center;
      flex-shrink: 0;
    }

    .ob-next-btn:active {
      opacity: 0.85;
      transform: scale(0.97);
    }

    /* dots */
    .ob-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 16px 0 32px;
      flex-shrink: 0;
    }

    .ob-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--bg3);
      border: 1.5px solid var(--border);
      transition: background 0.2s, transform 0.2s;
    }

    .ob-dot.active {
      background: var(--gold);
      border-color: var(--gold);
      transform: scale(1.25);
    }

    /* skip button */
    .ob-skip-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      color: var(--text3);
      font-size: 14px;
      font-family: 'Noto Sans JP', sans-serif;
      cursor: pointer;
      padding: 8px;
      z-index: 10;
    }

    /* ===== EVENT LIST ===== */
    .event-list-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 10px;
      box-shadow: var(--shadow-card);
      cursor: pointer;
      transition: transform 0.1s;
      display: block;
      width: 100%;
      text-align: left;
    }

    .event-list-card:active { transform: scale(0.98); }

    .event-list-name {
      font-weight: 700;
      font-size: 16px;
      color: var(--text);
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .event-list-meta {
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 8px;
    }

    .event-list-id {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--gold);
      font-weight: 600;
      letter-spacing: 0.1em;
    }

    .event-list-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .event-list-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text3);
    }

    /* ===== SCORE POPUP ===== */
    #score-popup.active #score-popup-inner {
      animation: slideUp 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    .popup-handle {
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .popup-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .popup-date {
      font-family: 'DM Serif Display', serif;
      font-size: 18px;
      color: var(--text);
    }

    .popup-close-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 32px;
      height: 32px;
      font-size: 14px;
      cursor: pointer;
      color: var(--text2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .score-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      gap: 10px;
    }

    .score-row-name {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 14px;
      color: var(--text);
      flex: 1;
      min-width: 0;
    }

    .score-row-name span:first-child {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .prio-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .prio-normal    { background: var(--bg3);       color: var(--text3); }
    .prio-important { background: var(--maybe-bg);  color: var(--maybe); }
    .prio-required  { background: var(--no-bg);     color: var(--no); }

    .score-row-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .score-choice {
      font-size: 17px;
      font-weight: 700;
      width: 22px;
      text-align: center;
    }

    .score-pts {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--gold);
      min-width: 40px;
      text-align: right;
    }

    .score-pts.zero { color: var(--text3); }

    .score-divider {
      height: 1px;
      background: var(--border);
      margin: 14px 0 10px;
    }

    .score-total-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 4px 0;
    }

    .score-total-label {
      font-size: 13px;
      color: var(--text2);
    }

    .score-formula {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text3);
      margin-top: 3px;
    }

    .score-total-val {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      color: var(--gold);
    }

    .score-warn {
      background: var(--no-bg);
      border: 1px solid rgba(201,48,68,.2);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-size: 12px;
      color: var(--no);
      margin-top: 14px;
      line-height: 1.55;
    }

    /* ===== HOME LINKS (walkthrough / demo) ===== */
    .home-links {
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .home-link-btn {
      background: none;
      border: none;
      color: var(--text3);
      font-size: 12px;
      cursor: pointer;
      font-family: 'Noto Sans JP', sans-serif;
      padding: 6px 8px;
      text-decoration: underline;
      text-decoration-color: var(--border);
      text-underline-offset: 2px;
    }

    .home-link-sep { color: var(--text3); font-size: 12px; }

    /* ===== WALKTHROUGH ===== */
    #walkthrough {
      background: rgba(0,0,0,0.52);
    }

    .wt-panel {
      background: var(--bg2);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 24px 20px 36px;
      width: 100%;
      box-shadow: 0 -4px 24px rgba(0,0,0,0.18);
    }

    .wt-step-ind {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--gold);
      letter-spacing: 0.12em;
      margin-bottom: 8px;
    }

    .wt-title {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--text);
      margin-bottom: 8px;
    }

    .wt-desc {
      font-size: 14px;
      color: var(--text2);
      line-height: 1.75;
      margin-bottom: 20px;
    }

    .wt-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      align-items: center;
    }

    .wt-skip-btn {
      background: none;
      border: none;
      color: var(--text3);
      font-size: 14px;
      padding: 10px 14px;
      cursor: pointer;
      font-family: 'Noto Sans JP', sans-serif;
    }

    .wt-next-btn {
      background: var(--gold);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 700;
      padding: 10px 24px;
      cursor: pointer;
      font-family: 'Noto Sans JP', sans-serif;
    }

    /* element highlight */
    @keyframes wtPulse {
      0%, 100% { outline-color: var(--gold);  box-shadow: 0 0 0 0 rgba(184,146,46,0.5); }
      50%       { outline-color: var(--gold2); box-shadow: 0 0 0 8px rgba(184,146,46,0); }
    }

    .wt-highlight {
      outline: 3px solid var(--gold) !important;
      outline-offset: 4px !important;
      animation: wtPulse 1.1s ease-in-out infinite;
      position: relative !important;
      z-index: 901 !important;
    }

    /* ===== DESIGN SYSTEM ADDITIONS ===== */

    /* カード上端ゴールドライン（ダークモード用） */
    @media (prefers-color-scheme: dark) {
      .card-gold {
        position: relative;
        overflow: hidden;
      }
      .card-gold::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(201,168,76,.35), transparent);
        pointer-events: none;
      }
    }

    /* セクションラベル */
    .section-label {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text3);
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      margin-top: 20px;
    }
    .section-label:first-child { margin-top: 0; }
    .section-label::before {
      content: '';
      display: block;
      width: 2px;
      height: 12px;
      background: var(--gold);
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* メニューカード */
    .menu-card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 16px;
      cursor: pointer;
      box-shadow: var(--shadow-card);
      transition: transform .15s, border-color .15s;
      width: 100%;
      text-align: left;
      position: relative;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .menu-card:active { transform: scale(0.97); }
    .menu-card-icon { font-size: 24px; flex-shrink: 0; width: 32px; text-align: center; }
    .menu-card-body { flex: 1; min-width: 0; }
    .menu-card-label { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .menu-card-desc { font-size: 12px; color: var(--text2); }
    .menu-card-arrow { color: var(--text3); font-size: 18px; flex-shrink: 0; }

    /* シマーアニメーション（優先度保存ボタン用） */
    @keyframes shimmerMove {
      0%   { transform: translateX(-100%); }
      60%  { transform: translateX(100%); }
      100% { transform: translateX(100%); }
    }

    .btn-shimmer {
      position: relative;
      overflow: hidden;
    }

    .btn-shimmer::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
      animation: shimmerMove 2.8s ease-in-out infinite;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- ===== ONBOARDING OVERLAY ===== -->
  <div id="onboarding">
    <!-- JS で動的生成 -->
  </div>

  <!-- ===== WALKTHROUGH OVERLAY ===== -->
  <div id="walkthrough">
    <!-- JS で動的生成 -->
  </div>

  <!-- ===== SCORE POPUP ===== -->
  <div id="score-popup">
    <div id="score-popup-inner"></div>
  </div>

  <!-- ===== CUSTOM MODAL ===== -->
  <div id="modal-overlay">
    <div class="modal-box">
      <div id="modal-title" class="modal-title"></div>
      <div id="modal-msg" class="modal-msg"></div>
      <div id="modal-actions" class="modal-actions"></div>
    </div>
  </div>

  <!-- ===== TOAST ===== -->
  <div id="toast"></div>

  <!-- ===== SCREEN: home ===== -->
  <div id="screen-home" class="screen active">
    <!-- 背景エフェクト -->
    <div class="home-bg-glow"></div>
    <div class="home-bg-grid"></div>

    <div class="home-inner">
      <!-- 左カラム：ヒーロー -->
      <div class="home-hero">
        <div class="home-logo">にちかん</div>
        <div class="home-tagline">日程調整を、かしこく。</div>
        <!-- スマホ用グロードット -->
        <div class="home-glow-dots">
          <div class="home-glow-dot"></div>
          <div class="home-glow-dot active"></div>
          <div class="home-glow-dot"></div>
        </div>
        <!-- PC用機能説明 -->
        <ul class="home-features-list">
          <li>候補日を選んでIDを発行・チームに共有</li>
          <li>参加者は6文字のIDで○△×回答</li>
          <li>優先度設定で最適日を自動スコアリング</li>
          <li>日程確定・テキストコピーで周知まで完結</li>
        </ul>
        <div class="home-links">
          <button type="button" id="btn-walkthrough" class="home-link-btn">使い方を見る</button>
          <span class="home-link-sep">・</span>
          <button type="button" id="btn-load-demo" class="home-link-btn">デモを読み込む</button>
        </div>
      </div>

      <!-- 右カラム：役割カード -->
      <div class="home-cards">
        <button class="role-btn role-btn-host" id="btn-to-host">
          <span class="role-icon">&#128197;</span>
          <div>
            <div class="role-label">主催者</div>
            <div class="role-desc">イベントを作成・管理する</div>
            <div class="role-features">
              <span class="role-feature-tag">作成</span>
              <span class="role-feature-tag">優先度設定</span>
              <span class="role-feature-tag">日程確定</span>
              <span class="role-feature-tag">一覧</span>
            </div>
          </div>
        </button>
        <button class="role-btn role-btn-guest" id="btn-to-guest">
          <span class="role-icon">&#128075;</span>
          <div>
            <div class="role-label">参加者</div>
            <div class="role-desc">日程に回答・集計を確認する</div>
            <div class="role-features">
              <span class="role-feature-tag">&#9675;&#9651;&#215;回答</span>
              <span class="role-feature-tag">集計確認</span>
              <span class="role-feature-tag">コメント</span>
            </div>
          </div>
        </button>
      </div>
    </div>
  </div>

  <!-- ===== SCREEN: host ===== -->
  <div id="screen-host" class="screen">
    <div class="header">
      <button class="back-btn" id="host-back">&#8592;</button>
      <span class="header-logo">にちかん</span>
      <span class="header-title">主催者</span>
    </div>
    <div class="menu-list">
      <div class="section-label">イベント管理</div>
      <button class="menu-card card-gold" id="btn-to-create">
        <span class="menu-card-icon">&#9999;&#65039;</span>
        <div class="menu-card-body">
          <div class="menu-card-label">イベントを作成</div>
          <div class="menu-card-desc">候補日を設定してIDを発行する</div>
        </div>
        <span class="menu-card-arrow">&#8250;</span>
      </button>
      <button class="menu-card card-gold" id="btn-to-event-list">
        <span class="menu-card-icon">&#128203;</span>
        <div class="menu-card-body">
          <div class="menu-card-label">作成済みイベント一覧</div>
          <div class="menu-card-desc">過去に作ったイベントを確認</div>
        </div>
        <span class="menu-card-arrow">&#8250;</span>
      </button>
      <div class="section-label">確認・集計</div>
      <button class="menu-card card-gold" id="btn-to-result-from-host">
        <span class="menu-card-icon">&#128202;</span>
        <div class="menu-card-body">
          <div class="menu-card-label">集計を確認</div>
          <div class="menu-card-desc">回答状況とスコアを見る</div>
        </div>
        <span class="menu-card-arrow">&#8250;</span>
      </button>
      <button class="menu-card card-gold" id="btn-to-admin-entry">
        <span class="menu-card-icon">&#9881;&#65039;</span>
        <div class="menu-card-body">
          <div class="menu-card-label">イベントを管理</div>
          <div class="menu-card-desc">優先度設定・リセット</div>
        </div>
        <span class="menu-card-arrow">&#8250;</span>
      </button>
    </div>
  </div>

  <!-- ===== SCREEN: guest ===== -->
  <div id="screen-guest" class="screen">
    <div class="header">
      <button class="back-btn" id="guest-back">&#8592;</button>
      <span class="header-logo">にちかん</span>
      <span class="header-title">参加者</span>
    </div>
    <div class="menu-list">
      <div class="section-label">回答・確認</div>
      <button class="menu-card card-gold" id="btn-to-join">
        <span class="menu-card-icon">&#9989;</span>
        <div class="menu-card-body">
          <div class="menu-card-label">日程に回答する</div>
          <div class="menu-card-desc">IDを入力して○△×を回答</div>
        </div>
        <span class="menu-card-arrow">&#8250;</span>
      </button>
      <button class="menu-card card-gold" id="btn-to-result-from-guest">
        <span class="menu-card-icon">&#128202;</span>
        <div class="menu-card-body">
          <div class="menu-card-label">集計を確認</div>
          <div class="menu-card-desc">回答状況と最適日を見る</div>
        </div>
        <span class="menu-card-arrow">&#8250;</span>
      </button>
    </div>
  </div>

  <!-- ===== SCREEN: create ===== -->
  <div id="screen-create" class="screen">
    <div class="header">
      <button class="back-btn" id="create-back">&#8592;</button>
      <span class="header-title">イベントを作成</span>
    </div>
    <div class="content">
      <div class="form-group">
        <label class="form-label" for="create-name">イベント名 <span class="required">*</span></label>
        <input type="text" id="create-name" class="form-input" maxlength="40" placeholder="例：チーム懇親会">
        <div class="form-hint"><span id="create-name-count">0</span> / 40</div>
      </div>
      <div class="form-group">
        <label class="form-label" for="create-memo">メモ（任意）</label>
        <textarea id="create-memo" class="form-textarea" rows="3" placeholder="場所や連絡事項など"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label" for="create-deadline">回答締め切り日（任意）</label>
        <input type="date" id="create-deadline" class="form-input">
      </div>
      <div class="form-group">
        <label class="form-label">参加者名（任意）</label>
        <div class="member-input-row">
          <input type="text" id="member-input" class="form-input" maxlength="20" placeholder="名前を入力">
          <button type="button" id="btn-add-member" class="add-btn">追加</button>
        </div>
        <div id="member-tags" class="tag-list"></div>
      </div>
      <div class="form-group">
        <label class="form-label">候補日 <span class="required">*</span></label>
        <div class="cal-wrap">
          <div class="cal-nav">
            <button type="button" id="cal-prev" class="cal-nav-btn">&#8249;</button>
            <span id="cal-month-label" class="cal-month-label"></span>
            <button type="button" id="cal-next" class="cal-nav-btn">&#8250;</button>
          </div>
          <div id="cal-grid" class="cal-grid"></div>
        </div>
        <div id="selected-dates-list" class="date-tag-list"></div>
      </div>
      <button type="button" id="btn-create-submit" class="primary-btn">イベントを作成する</button>
    </div>
  </div>

  <!-- ===== SCREEN: created ===== -->
  <div id="screen-created" class="screen">
    <div class="header">
      <button class="back-btn" id="created-back">&#8592;</button>
      <span class="header-title">作成完了</span>
    </div>
    <div class="content">
      <div class="created-id-card">
        <div class="created-card-eyebrow">イベントID</div>
        <div id="created-id-value" class="created-id-value">------</div>

      <button type="button" id="btn-to-result-from-created" class="primary-btn">集計を見る</button>
      <button type="button" id="btn-created-home" class="secondary-btn">ホームへ戻る</button>

      <button class="back-btn" id="join-back">&#8592;</button>
      <span class="header-title">イベントに参加</span>

      <div class="form-group">
        <label class="form-label" for="join-id">イベントID</label>
        <input type="text" id="join-id" class="form-input" maxlength="6"

          autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
      </div>

      <div id="join-event-info" style="display:none;">
        <div class="join-event-card">
          <div class="join-event-label">イベント</div>

          <div id="join-event-meta" class="join-event-meta"></div>

          <div id="join-member-chips" class="tag-list" style="margin-bottom:12px;"></div>

        <button type="button" id="btn-join-submit" class="primary-btn">回答する</button>

    </div>
  </div>

  <!-- ===== SCREEN: answer ===== -->
  <div id="screen-answer" class="screen">
    <div class="header">
      <button class="back-btn" id="answer-back">&#8592;</button>
      <span class="header-title" id="answer-header-title">回答</span>

      </div>
      <button type="button" id="btn-submit-answer" class="primary-btn">回答を送信する</button>
    </div>

  <!-- ===== SCREEN: result-entry ===== -->
  <div id="screen-result-entry" class="screen">
    <div class="header">
      <button class="back-btn" id="result-entry-back">&#8592;</button>
      <span class="header-title">集計を確認</span>
    </div>
    <div class="content">
      <div class="form-group">
        <label class="form-label" for="result-id">イベントID</label>
        <input type="text" id="result-id" class="form-input" maxlength="6"
          placeholder="6文字のIDを入力"
          autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
      </div>
      <button type="button" id="btn-result-entry-submit" class="primary-btn">集計を見る</button>
    </div>
  </div>

  <!-- ===== SCREEN: result ===== -->
  <div id="screen-result" class="screen">
    <div class="header">
      <button class="back-btn" id="result-back">&#8592;</button>
      <span class="header-title" id="result-header-title">集計</span>
    </div>
    <div class="tab-bar">
      <button class="tab-btn" id="tab-btn-table">集計表</button>
      <button class="tab-btn" id="tab-btn-chart">グラフ</button>
      <button class="tab-btn" id="tab-btn-best">最適日</button>
      <button class="tab-btn" id="tab-btn-comments">コメント</button>

    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getDatabase, ref, get, set } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

    var firebaseConfig = {
      apiKey: "AIzaSyBi8T1eiSrFt4Cvqg8Cc1P6nmob-hpOSrs",

  <!-- ===== MAIN SCRIPT ===== -->
  <script>
    /* ===== ONBOARDING / WALKTHROUGH STATE ===== */
    var obIndex = 0;
    var obTouchStartX = 0;
    var wtIndex = 0;

    /* ===== STATE ===== */
    var state = {
      eventId: null,
      eventData: null,
      joinName: null,
      answerChoices: {},
      calYear: new Date().getFullYear(),
      calMonth: new Date().getMonth(),
      selectedDates: [],
      members: [],
      chart: null,
      chartRatio: null,
      resultSummary: null,
      role: null
    };

    /* ===== FIREBASE BRIDGE ===== */
    var _db = null;
    window.addEventListener('firebase-ready', function() {
      _db = window._db;
    });

    function getEvent(id) {
      if (!_db) { toast('通信準備中…'); return Promise.resolve(null); }
      return window._get(window._ref(_db, 'events/' + id))
        .then(function(snap) { return snap.exists() ? snap.val() : null; });
    }

    function saveEvent(data) {
      if (!_db) { toast('通信準備中…'); return Promise.resolve(); }
      return window._set(window._ref(_db, 'events/' + data.id), data);
    }

    /* ===== LOCAL STORAGE ===== */
    function loadDB() {
      try { return JSON.parse(localStorage.getItem('nichikan_db') || '{}'); } catch(e) { return {}; }
    }

    function saveDB(db) {
      localStorage.setItem('nichikan_db', JSON.stringify(db));
    }

    /* ===== NAVIGATION ===== */
    function go(name) {
      var screens = document.querySelectorAll('.screen');
      for (var i = 0; i < screens.length; i++) {
        screens[i].classList.remove('active');
      }
      var target = document.getElementById('screen-' + name);
      if (target) { target.classList.add('active'); }
      window.scrollTo(0, 0);
    }

    /* ===== TOAST ===== */
    function toast(msg) {
      var el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(function() { el.classList.remove('show'); }, 2500);
    }

    /* ===== CUSTOM MODAL ===== */
    function showModal(title, msg, buttons) {
      document.getElementById('modal-title').textContent = title;
      document.getElementById('modal-msg').textContent = msg;
      var actionsEl = document.getElementById('modal-actions');
      actionsEl.innerHTML = '';
      for (var i = 0; i < buttons.length; i++) {
        (function(btn) {
          var b = document.createElement('button');
          b.textContent = btn.label;
          if (btn.primary) {
            b.style.background = 'var(--gold)';
            b.style.color = '#fff';
          } else {
            b.style.background = 'var(--bg3)';
            b.style.color = 'var(--text)';
          }
          b.style.border = 'none';
          b.style.padding = '8px 18px';
          b.style.borderRadius = 'var(--radius-sm)';
          b.style.fontSize = '14px';
          b.style.cursor = 'pointer';
          b.addEventListener('click', function() {
            closeModal();
            if (btn.onClick) { btn.onClick(); }
          });
          actionsEl.appendChild(b);
        })(buttons[i]);
      }
      document.getElementById('modal-overlay').classList.add('active');
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('active');
    }

    /* ===== UTILS ===== */
    function $(id) { return document.getElementById(id); }

    function fmt(s) {
      var parts = s.split('-').map(Number);
      var y = parts[0], m = parts[1], d = parts[2];
      var dw = ['日', '月', '火', '水', '木', '金', '土'];
      return m + '/' + d + '（' + dw[new Date(y, m - 1, d).getDay()] + '）';
    }

    function genId() {
      var c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      var result = '';
      var used = {};
      while (result.length < 6) {
        var ch = c[Math.floor(Math.random() * c.length)];
        if (!used[ch]) { used[ch] = true; result += ch; }
      }
      return result;
    }

    function sanitizeKey(name) {
      return name.replace(/[.#$[\]]/g, '_');
    }

    /* ===== INIT ===== */
    document.addEventListener('DOMContentLoaded', function() {
      setupNav();
      go('home');
      initOnboarding();

      /* URL parameter: ?id=XXXXXX → 参加画面へ直接遷移 */
      var urlParams = new URLSearchParams(location.search);
      var urlId = urlParams.get('id');
      if (urlId) {
        var cleanId = urlId.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 6);
        if (cleanId.length === 6) {
          document.getElementById('join-id').value = cleanId;
          state.role = 'guest';
          go('guest');
          setTimeout(function() { joinEvent(); }, 100);
        }
      }
    });

    /* ===== NAVIGATION SETUP ===== */
    function setupNav() {
      /* --- role selection --- */
      document.getElementById('btn-to-host').addEventListener('click', function() {
        state.role = 'host';
        go('host');
      });
      document.getElementById('btn-to-guest').addEventListener('click', function() {
        state.role = 'guest';
        go('guest');
      });

      /* --- host menu --- */
      document.getElementById('btn-to-create').addEventListener('click', function() {
        openCreate();
        go('create');

      document.getElementById('btn-to-event-list').addEventListener('click', function() {

      document.getElementById('btn-to-result-from-host').addEventListener('click', function() { go('result-entry'); });
      document.getElementById('btn-to-admin-entry').addEventListener('click', function() { go('admin-entry'); });

      /* --- guest menu --- */
      document.getElementById('btn-to-join').addEventListener('click', function() { go('join'); });
      document.getElementById('btn-to-result-from-guest').addEventListener('click', function() { go('result-entry'); });

      /* --- back buttons --- */
      document.getElementById('host-back').addEventListener('click', function() { go('home'); });
      document.getElementById('guest-back').addEventListener('click', function() { go('home'); });
      document.getElementById('create-back').addEventListener('click', function() { go('host'); });
      document.getElementById('created-back').addEventListener('click', function() { go('home'); });
      document.getElementById('join-back').addEventListener('click', function() { go('guest'); });
      document.getElementById('answer-back').addEventListener('click', function() { go('join'); });
      document.getElementById('result-entry-back').addEventListener('click', function() {
        go(state.role === 'host' ? 'host' : 'guest');
      });
      document.getElementById('result-back').addEventListener('click', function() {
        go(state.role === 'host' ? 'host' : 'guest');
      });
      document.getElementById('event-list-back').addEventListener('click', function() { go('host'); });
      document.getElementById('admin-entry-back').addEventListener('click', function() { go('host'); });
      document.getElementById('admin-back').addEventListener('click', function() { go('host'); });

      /* --- create screen wiring --- */
      document.getElementById('cal-prev').addEventListener('click', function() {
        state.calMonth--;
        if (state.calMonth < 0) { state.calMonth = 11; state.calYear--; }
        renderCal();
      });
      document.getElementById('cal-next').addEventListener('click', function() {
        state.calMonth++;
        if (state.calMonth > 11) { state.calMonth = 0; state.calYear++; }
        renderCal();
      });
      document.getElementById('btn-add-member').addEventListener('click', addMember);
      document.getElementById('member-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { e.preventDefault(); addMember(); }

      document.getElementById('create-name').addEventListener('input', function() {
        document.getElementById('create-name-count').textContent = this.value.length;
      });
      document.getElementById('btn-create-submit').addEventListener('click', createEvent);

      /* --- join screen --- */
      document.getElementById('join-id').addEventListener('input', function() {
        var val = this.value.replace(/[^A-Za-z0-9]/g, '').toUpperCase();
        this.value = val;
        if (val.length === 6) {
          joinEvent();
        } else {
          document.getElementById('join-event-info').style.display = 'none';
        }
      });
      document.getElementById('btn-join-submit').addEventListener('click', goToAnswer);

      /* --- answer screen --- */
      document.getElementById('btn-submit-answer').addEventListener('click', submitAnswer);

      /* --- home links --- */
      document.getElementById('btn-walkthrough').addEventListener('click', startWalkthrough);
      document.getElementById('btn-load-demo').addEventListener('click', function() {
        loadDemoData();
        go('event-list');
        setTimeout(renderEventList, 100);
      });

      /* --- score popup backdrop --- */
      document.getElementById('score-popup').addEventListener('click', function(e) {
        if (e.target === this) { hideScorePopup(); }
      });

      /* --- admin-entry --- */
      document.getElementById('admin-id').addEventListener('input', function() {
        this.value = this.value.replace(/[^A-Za-z0-9]/g, '').toUpperCase();
      });
      document.getElementById('btn-admin-entry-submit').addEventListener('click', function() {
        var id = document.getElementById('admin-id').value.trim().toUpperCase();
        if (id.length !== 6) { toast('IDを6文字入力してください'); return; }
        getEvent(id).then(function(data) {
          if (!data) { toast('イベントが見つかりません'); return; }
          state.eventId = id;
          state.eventData = data;
          state.role = 'host';
          openAdmin(data);
          go('admin');
        }).catch(function() { toast('取得に失敗しました'); });
      });

      /* --- result-entry --- */
      document.getElementById('result-id').addEventListener('input', function() {
        this.value = this.value.replace(/[^A-Za-z0-9]/g, '').toUpperCase();
      });
      document.getElementById('btn-result-entry-submit').addEventListener('click', function() {
        var id = document.getElementById('result-id').value.trim().toUpperCase();
        if (id.length !== 6) { toast('IDを6文字入力してください'); return; }
        getEvent(id).then(function(data) {
          if (!data) { toast('イベントが見つかりません'); return; }
          state.eventId = id;
          state.eventData = data;
          renderResult();
          go('result');
        }).catch(function() { toast('取得に失敗しました'); });
      });

      /* --- result tabs --- */
      document.getElementById('tab-btn-table').addEventListener('click',        function() { switchTab('table'); });
      document.getElementById('tab-btn-chart').addEventListener('click',        function() { switchTab('chart'); });
      document.getElementById('tab-btn-best').addEventListener('click',         function() { switchTab('best'); });
      document.getElementById('tab-btn-comments').addEventListener('click',     function() { switchTab('comments'); });
      document.getElementById('tab-btn-admin-inline').addEventListener('click', function() { switchTab('admin-inline'); });

      /* --- created screen --- */
      document.getElementById('btn-copy-id').addEventListener('click', function() {
        copyText(document.getElementById('created-id-value').textContent);
      });
      document.getElementById('btn-copy-url').addEventListener('click', function() {
        copyText(document.getElementById('created-share-url').textContent);
      });
      document.getElementById('btn-to-result-from-created').addEventListener('click', function() {
        state.role = 'host';
        renderResult();
        go('result');
      });
      document.getElementById('btn-created-home').addEventListener('click', function() {
        go('home');
      });
