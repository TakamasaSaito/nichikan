<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>にちかん - 日程調整</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root {
    --bg:#F7F5F0;--surface:#FFFFFF;--surface2:#F0EDE6;--border:#E2DDD5;
    --text:#1A1714;--text2:#6B6560;--accent:#D4521A;--accent2:#E8A87C;
    --ok:#2E7D32;--maybe:#E65100;--no:#B71C1C;
    --ok-bg:#E8F5E9;--maybe-bg:#FFF3E0;--no-bg:#FFEBEE;
    --radius:16px;--shadow:0 2px 12px rgba(0,0,0,0.08);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px}
  .header{background:var(--text);color:white;padding:20px 20px 16px;position:sticky;top:0;z-index:100}
  .header-inner{max-width:480px;margin:0 auto}
  .logo{font-size:22px;font-weight:800;letter-spacing:-0.5px}
  .logo span{color:var(--accent2)}
  .header-sub{font-size:11px;opacity:0.5;margin-top:2px}
  .main{max-width:480px;margin:0 auto;padding:20px 16px}
  .card{background:var(--surface);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:16px}
  .card-title{font-size:13px;font-weight:700;color:var(--text2);letter-spacing:.05em;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:6px}
  .card-title::before{content:'';display:block;width:3px;height:14px;background:var(--accent);border-radius:2px}
  .screen{display:none}.screen.active{display:block}
  .home-hero{background:var(--text);border-radius:var(--radius);padding:28px 24px;color:white;margin-bottom:16px;position:relative;overflow:hidden}
  .home-hero::after{content:'📅';position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:48px;opacity:.15}
  .home-hero h1{font-size:24px;font-weight:800;margin-bottom:6px}
  .home-hero p{font-size:13px;opacity:.6;line-height:1.6}
  .home-buttons{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .home-btn{background:var(--surface);border:none;border-radius:var(--radius);padding:20px 16px;text-align:left;cursor:pointer;box-shadow:var(--shadow);transition:transform .15s,box-shadow .15s}
  .home-btn:active{transform:scale(.97);box-shadow:none}
  .home-btn-icon{font-size:28px;margin-bottom:8px}
  .home-btn-label{font-size:14px;font-weight:700;color:var(--text)}
  .home-btn-desc{font-size:11px;color:var(--text2);margin-top:2px}
  .form-group{margin-bottom:14px}
  .form-label{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px;display:block}
  .form-input{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:10px;font-size:15px;background:var(--surface);color:var(--text);outline:none;transition:border-color .2s;font-family:inherit}
  .form-input:focus{border-color:var(--accent)}
  .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .cal-nav-btn{background:var(--surface2);border:none;border-radius:8px;width:36px;height:36px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .cal-month{font-size:15px;font-weight:700}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
  .cal-dow{text-align:center;font-size:10px;font-weight:700;color:var(--text2);padding:4px 0}
  .cal-dow:first-child{color:#c0392b}.cal-dow:last-child{color:#2980b9}
  .cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:13px;cursor:pointer;border:2px solid transparent;transition:all .15s;font-weight:500}
  .cal-day.past{color:#ccc;pointer-events:none}
  .cal-day.selected{background:var(--accent);color:white!important;font-weight:700}
  .cal-day.sunday{color:#c0392b}.cal-day.saturday{color:#2980b9}
  .date-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .date-tag{background:var(--ok-bg);color:var(--ok);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:4px}
  .date-tag-remove{cursor:pointer;opacity:.6;font-size:14px}
  .btn{width:100%;padding:16px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit}
  .btn:active{transform:scale(.98)}
  .btn-primary{background:var(--accent);color:white}
  .btn-secondary{background:var(--surface2);color:var(--text)}
  .event-id-display{background:var(--text);color:white;border-radius:var(--radius);padding:24px;text-align:center;margin-bottom:16px}
  .event-id-label{font-size:11px;opacity:.5;margin-bottom:8px}
  .event-id-value{font-size:40px;font-weight:900;letter-spacing:6px;color:var(--accent2)}
  .event-id-copy{margin-top:12px;background:rgba(255,255,255,.1);color:white;border:none;border-radius:8px;padding:10px 20px;font-size:13px;cursor:pointer;font-family:inherit}
  .id-input-big{text-align:center;font-size:32px;font-weight:900;letter-spacing:8px;text-transform:uppercase}
  .answer-date-row{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);gap:10px}
  .answer-date-row:last-child{border-bottom:none}
  .answer-date-label{flex:1;font-size:14px;font-weight:600}
  .answer-btns{display:flex;gap:6px}
  .ans-btn{width:42px;height:42px;border-radius:10px;border:2px solid var(--border);background:var(--surface);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
  .ans-btn.active-ok{background:var(--ok-bg);border-color:var(--ok)}
  .ans-btn.active-maybe{background:var(--maybe-bg);border-color:var(--maybe)}
  .ans-btn.active-no{background:var(--no-bg);border-color:var(--no)}
  .agg-header{display:flex;background:var(--surface2);border-radius:8px;padding:8px 10px;margin-bottom:6px;font-size:11px;font-weight:700;color:var(--text2)}
  .agg-row{display:flex;align-items:center;padding:10px;border-radius:8px;margin-bottom:4px}
  .agg-row.best{background:#E8F5E9}
  .agg-col-date{flex:1.5;font-size:13px;font-weight:600}
  .agg-col-votes{flex:1;text-align:center;font-size:13px}
  .agg-col-score{flex:1;text-align:right;font-size:13px;font-weight:700}
  .best-badge{background:var(--ok);color:white;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-left:6px}
  .participant-row{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);gap:10px}
  .participant-row:last-child{border-bottom:none}
  .participant-name{flex:1;font-size:14px;font-weight:600}
  .priority-select{border:2px solid var(--border);border-radius:8px;padding:6px 10px;font-size:13px;font-family:inherit;background:var(--surface);color:var(--text);outline:none}
  .tabs{display:flex;gap:6px;margin-bottom:16px}
  .tab{flex:1;padding:10px;text-align:center;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:none;background:var(--surface2);color:var(--text2);transition:all .15s;font-family:inherit}
  .tab.active{background:var(--accent);color:white}
  .chart-wrap{position:relative;height:200px}
  .loading{text-align:center;padding:40px;color:var(--text2);font-size:14px}
  .loading::after{content:'';display:block;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;margin:12px auto 0;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:white;padding:12px 24px;border-radius:24px;font-size:14px;font-weight:600;z-index:9999;transition:transform .3s;white-space:nowrap}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .note{background:#FFF8F0;border-left:3px solid var(--accent2);border-radius:0 8px 8px 0;padding:10px 14px;font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:12px}
  .back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;font-size:14px;color:var(--text2);cursor:pointer;padding:0;font-family:inherit;margin-bottom:16px}
  .divider{height:1px;background:var(--border);margin:16px 0}
  .pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
  .pill-required{background:#FFEBEE;color:#B71C1C}
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div class="logo">にち<span>かん</span></div>
    <div class="header-sub">みんなの日程を、かしこく調整</div>
  </div>
</div>
<div class="main">
  <div id="screen-home" class="screen active">
    <div class="home-hero"><h1>日程調整を<br>かんたんに</h1><p>IDを共有するだけ。<br>リアルタイム集計。</p></div>
    <div class="home-buttons">
      <button class="home-btn" data-screen="create"><div class="home-btn-icon">✏️</div><div class="home-btn-label">作成する</div><div class="home-btn-desc">イベントを立てる</div></button>
      <button class="home-btn" data-screen="join"><div class="home-btn-icon">🙋</div><div class="home-btn-label">参加する</div><div class="home-btn-desc">IDで参加・回答</div></button>
      <button class="home-btn" data-screen="result-entry"><div class="home-btn-icon">📊</div><div class="home-btn-label">集計を見る</div><div class="home-btn-desc">リアルタイム集計</div></button>
      <button class="home-btn" data-screen="admin-entry"><div class="home-btn-icon">⚙️</div><div class="home-btn-label">管理する</div><div class="home-btn-desc">重要度を設定</div></button>
    </div>
  </div>
  <div id="screen-create" class="screen">
    <button class="back-btn" data-screen="home">← ホームへ</button>
    <div class="card">
      <div class="card-title">イベント情報</div>
      <div class="form-group"><label class="form-label">イベント名 *</label><input class="form-input" id="create-name" placeholder="例：7月の飲み会" maxlength="40"></div>
      <div class="form-group"><label class="form-label">メモ（任意）</label><input class="form-input" id="create-memo" placeholder="例：渋谷近辺で考えています"></div>
    </div>
    <div class="card">
      <div class="card-title">候補日を選択</div>
      <div class="cal-nav">
        <button class="cal-nav-btn" id="cal-prev">‹</button>
        <div class="cal-month" id="cal-month-label"></div>
        <button class="cal-nav-btn" id="cal-next">›</button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
      <div class="date-tags" id="date-tags"></div>
    </div>
    <button class="btn btn-primary" id="btn-create-event">イベントを作成する</button>
  </div>
  <div id="screen-created" class="screen">
    <div class="event-id-display">
      <div class="event-id-label">イベントID</div>
      <div class="event-id-value" id="created-id-display">----</div>
      <button class="event-id-copy" id="btn-copy-id">IDをコピー</button>
    </div>
    <div class="note">このIDを参加者に共有してください。</div>
    <div class="card"><div id="created-summary"></div></div>
    <button class="btn btn-primary" id="btn-go-admin" style="margin-bottom:10px">重要度を設定する（任意）</button>
    <button class="btn btn-secondary" data-screen="home">ホームへ戻る</button>
  </div>
  <div id="screen-join" class="screen">
    <button class="back-btn" data-screen="home">← ホームへ</button>
    <div class="card">
      <div class="card-title">IDで参加</div>
      <div class="form-group"><label class="form-label">イベントID（6文字）</label><input class="form-input id-input-big" id="join-id" placeholder="ABCD12" maxlength="6"></div>
      <div class="form-group"><label class="form-label">あなたの名前</label><input class="form-input" id="join-name" placeholder="例：山田太郎"></div>
      <button class="btn btn-primary" id="btn-join-event">参加する</button>
    </div>
  </div>
  <div id="screen-answer" class="screen">
    <button class="back-btn" data-screen="join">← 戻る</button>
    <div class="card" id="answer-event-info"></div>
    <div class="card"><div class="card-title">回答（○△×）</div><div id="answer-dates"></div></div>
    <button class="btn btn-primary" id="btn-submit-answer">回答を送信する</button>
  </div>
  <div id="screen-result-entry" class="screen">
    <button class="back-btn" data-screen="home">← ホームへ</button>
    <div class="card">
      <div class="card-title">集計を見る</div>
      <div class="form-group"><label class="form-label">イベントID</label><input class="form-input id-input-big" id="result-id-input" placeholder="ABCD12" maxlength="6"></div>
      <button class="btn btn-primary" id="btn-load-result">集計を表示</button>
    </div>
  </div>
  <div id="screen-result" class="screen">
    <button class="back-btn" data-screen="result-entry">← 戻る</button>
    <div class="card" id="result-event-info"></div>
    <div class="tabs">
      <button class="tab active" data-tab="table" id="tab-table">集計表</button>
      <button class="tab" data-tab="chart" id="tab-chart">グラフ</button>
      <button class="tab" data-tab="best" id="tab-best">最適日</button>
    </div>
    <div id="result-tab-table"><div class="card"><div class="card-title">○△×集計</div><div id="result-table-content"><div class="loading">読み込み中</div></div></div></div>
    <div id="result-tab-chart" style="display:none"><div class="card"><div class="card-title">参加可能人数（○）</div><div class="chart-wrap"><canvas id="result-chart"></canvas></div></div></div>
    <div id="result-tab-best" style="display:none"><div class="card"><div class="card-title">最適日提案</div><div id="result-best-content"></div></div></div>
  </div>
  <div id="screen-admin-entry" class="screen">
    <button class="back-btn" data-screen="home">← ホームへ</button>
    <div class="card">
      <div class="card-title">管理者ログイン</div>
      <div class="note">管理者パスワードは作成時に表示されたものです。</div>
      <div class="form-group"><label class="form-label">イベントID</label><input class="form-input id-input-big" id="admin-id-input" placeholder="ABCD12" maxlength="6"></div>
      <div class="form-group"><label class="form-label">管理者パスワード</label><input class="form-input" id="admin-pass-input" type="password"></div>
      <button class="btn btn-primary" id="btn-login-admin">管理画面へ</button>
    </div>
  </div>
  <div id="screen-admin" class="screen">
    <button class="back-btn" data-screen="home">← ホームへ</button>
    <div class="card" id="admin-event-info"></div>
    <div class="card">
      <div class="card-title">参加者の重要度設定</div>
      <div class="note">🔴 必須：×の日を除外<br>🟡 重要：スコア3倍<br>⚪ 一般：通常<br>※参加者には表示されません</div>
      <div id="admin-participants"></div>
      <div class="divider"></div>
      <button class="btn btn-primary" id="btn-save-admin">重要度を保存する</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const _app = initializeApp({
  apiKey: "AIzaSyBi8T1eiSrFt4Cvqg8Cc1P6nmob-hpOSrs",
  authDomain: "nichikan-7788c.firebaseapp.com",
  databaseURL: "https://nichikan-7788c-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "nichikan-7788c",
  storageBucket: "nichikan-7788c.firebasestorage.app",
  messagingSenderId: "332427860675",
  appId: "1:332427860675:web:d6ba6e6226ca9c4246e076"
});
const _db = getDatabase(_app);

let state = {
  eventId:null, eventData:null, joinName:null, answerChoices:{},
  calYear:new Date().getFullYear(), calMonth:new Date().getMonth(),
  selectedDates:[], adminToken:null, resultUnsub:null, chart:null
};

const $=id=>document.getElementById(id);
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function go(name){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));$('screen-'+name).classList.add('active');window.scrollTo(0,0)}
function genId(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';return Array.from({length:6},()=>c[Math.floor(Math.random()*c.length)]).join('')}
function genPass(){return Math.floor(100000+Math.random()*900000).toString()}
function fmt(s){const[y,m,d]=s.split('-').map(Number);const dw=['日','月','火','水','木','金','土'];return`${m}/${d}（${dw[new Date(y,m-1,d).getDay()]}）`}

function renderCal(){
  const y=state.calYear,m=state.calMonth;
  $('cal-month-label').textContent=`${y}年${m+1}月`;
  const dows=['日','月','火','水','木','金','土'];
  let html=dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  const first=new Date(y,m,1).getDay(),last=new Date(y,m+1,0).getDate();
  const today=new Date();today.setHours(0,0,0,0);
  for(let i=0;i<first;i++)html+='<div></div>';
  for(let d=1;d<=last;d++){
    const dt=new Date(y,m,d);
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const past=dt<today,sel=state.selectedDates.includes(ds),dow=dt.getDay();
    let cls='cal-day';
    if(past)cls+=' past';else if(sel)cls+=' selected';else if(dow===0)cls+=' sunday';else if(dow===6)cls+=' saturday';
    html+=`<div class="${cls}" data-date="${ds}">${d}</div>`;
  }
  $('cal-grid').innerHTML=html;
  $('cal-grid').querySelectorAll('[data-date]').forEach(el=>el.addEventListener('click',()=>toggleDate(el.dataset.date)));
  renderTags();
}
function toggleDate(ds){
  const i=state.selectedDates.indexOf(ds);
  if(i>=0)state.selectedDates.splice(i,1);else state.selectedDates.push(ds);
  state.selectedDates.sort();renderCal();
}
function renderTags(){
  const w=$('date-tags');
  w.innerHTML=state.selectedDates.map(d=>`<div class="date-tag">${fmt(d)}<span class="date-tag-remove" data-date="${d}">×</span></div>`).join('');
  w.querySelectorAll('.date-tag-remove').forEach(el=>el.addEventListener('click',()=>toggleDate(el.dataset.date)));
}

async function createEvent(){
  const name=$('create-name').value.trim();
  if(!name){toast('イベント名を入力してください');return}
  if(!state.selectedDates.length){toast('候補日を選択してください');return}
  const id=genId(),pass=genPass();
  const data={id,name,memo:$('create-memo').value.trim(),dates:state.selectedDates,createdAt:Date.now(),adminPass:pass,priorities:{},answers:{}};
  try{
    await set(ref(_db,`events/${id}`),data);
    state.eventId=id;state.eventData=data;state.adminToken=pass;
    $('created-id-display').textContent=id;
    $('created-summary').innerHTML=`
      <div style="font-size:18px;font-weight:800;margin-bottom:4px">${name}</div>
      ${data.memo?`<div style="font-size:13px;color:var(--text2);margin-bottom:10px">${data.memo}</div>`:''}
      <div style="font-size:12px;color:var(--text2)">候補日 ${state.selectedDates.length}件</div>
      <div class="date-tags" style="margin-top:8px">${state.selectedDates.map(d=>`<div class="date-tag">${fmt(d)}</div>`).join('')}</div>
      <div class="divider"></div>
      <div style="font-size:12px;color:var(--text2)">管理者パスワード</div>
      <div style="font-size:20px;font-weight:800;letter-spacing:4px;color:var(--accent)">${pass}</div>
      <div style="font-size:11px;color:var(--text2);margin-top:4px">※必ずメモしてください</div>`;
    go('created');
  }catch(e){toast('作成失敗: '+e.message);console.error(e)}
}

async function joinEvent(){
  const id=$('join-id').value.trim().toUpperCase();
  const name=$('join-name').value.trim();
  if(id.length!==6){toast('IDは6文字です');return}
  if(!name){toast('名前を入力してください');return}
  try{
    const snap=await get(ref(_db,`events/${id}`));
    if(!snap.exists()){toast('イベントが見つかりません');return}
    const data=snap.val();
    state.eventId=id;state.eventData=data;state.joinName=name;state.answerChoices={};
    $('answer-event-info').innerHTML=`<div style="font-size:18px;font-weight:800">${data.name}</div>${data.memo?`<div style="font-size:13px;color:var(--text2);margin-top:4px">${data.memo}</div>`:''}`;
    const w=$('answer-dates');
    w.innerHTML=data.dates.map(d=>`
      <div class="answer-date-row">
        <div class="answer-date-label">${fmt(d)}</div>
        <div class="answer-btns">
          <button class="ans-btn" data-date="${d}" data-val="ok">○</button>
          <button class="ans-btn" data-date="${d}" data-val="maybe">△</button>
          <button class="ans-btn" data-date="${d}" data-val="no">×</button>
        </div>
      </div>`).join('');
    w.querySelectorAll('.ans-btn').forEach(btn=>btn.addEventListener('click',()=>{
      const{date,val}=btn.dataset;
      state.answerChoices[date]=val;
      w.querySelectorAll(`.ans-btn[data-date="${date}"]`).forEach(b=>b.className='ans-btn'+(b.dataset.val===val?` active-${val}`:''));
    }));
    go('answer');
  }catch(e){toast('読み込み失敗');console.error(e)}
}

async function submitAnswer(){
  const unanswered=state.eventData.dates.filter(d=>!state.answerChoices[d]);
  if(unanswered.length){toast('全日付に回答してください');return}
  const key=state.joinName.replace(/[.#$[\]]/g,'_');
  try{
    await set(ref(_db,`events/${state.eventId}/answers/${key}`),{name:state.joinName,answers:state.answerChoices,answeredAt:Date.now()});
    toast('回答を送信しました！');go('home');
  }catch(e){toast('送信失敗');console.error(e)}
}

async function loadResult(){
  const id=$('result-id-input').value.trim().toUpperCase();
  if(id.length!==6){toast('IDは6文字です');return}
  if(state.resultUnsub)state.resultUnsub();
  state.resultUnsub=onValue(ref(_db,`events/${id}`),snap=>{
    if(!snap.exists()){toast('イベントが見つかりません');return}
    renderResult(snap.val());
  });
  go('result');
}

function renderResult(data){
  $('result-event-info').innerHTML=`<div style="font-size:18px;font-weight:800">${data.name}</div>${data.memo?`<div style="font-size:13px;color:var(--text2);margin-top:4px">${data.memo}</div>`:''}<div style="font-size:12px;color:var(--text2);margin-top:6px">${Object.keys(data.answers||{}).length}人が回答</div>`;
  const ans=data.answers||{},prio=data.priorities||{},dates=data.dates||[];
  const scored=dates.map(date=>{
    let ok=0,maybe=0,no=0,score=0,reqFail=false;
    Object.values(ans).forEach(a=>{
      const k=a.name.replace(/[.#$[\]]/g,'_'),p=prio[k]||'normal',w=p==='important'?3:1,c=a.answers[date];
      if(p==='required'&&c==='no')reqFail=true;
      if(c==='ok'){ok++;score+=2*w}else if(c==='maybe'){maybe++;score+=w}else if(c==='no')no++;
    });
    return{date,ok,maybe,no,score,reqFail};
  });
  const elig=scored.filter(s=>!s.reqFail),maxScore=Math.max(...elig.map(s=>s.score),0);
  $('result-table-content').innerHTML=scored.length===0
    ?'<div style="text-align:center;color:var(--text2);padding:20px">まだ回答がありません</div>'
    :`<div class="agg-header"><div class="agg-col-date">日付</div><div class="agg-col-votes">○ △ ×</div><div class="agg-col-score">スコア</div></div>`
    +scored.map(s=>`<div class="agg-row ${!s.reqFail&&s.score===maxScore&&maxScore>0?'best':''}">
      <div class="agg-col-date">${fmt(s.date)}${!s.reqFail&&s.score===maxScore&&maxScore>0?'<span class="best-badge">最適</span>':''}${s.reqFail?'<span class="pill pill-required" style="margin-left:4px">必須NG</span>':''}</div>
      <div class="agg-col-votes"><span style="color:var(--ok);font-weight:700">${s.ok}</span> / <span style="color:var(--maybe)">${s.maybe}</span> / <span style="color:var(--no)">${s.no}</span></div>
      <div class="agg-col-score">${s.reqFail?'—':s.score}</div></div>`).join('');
  if(state.chart)state.chart.destroy();
  state.chart=new Chart($('result-chart').getContext('2d'),{
    type:'bar',
    data:{labels:scored.map(s=>fmt(s.date)),datasets:[{label:'○',data:scored.map(s=>s.ok),backgroundColor:scored.map(s=>s.reqFail?'#eee':(!s.reqFail&&s.score===maxScore&&maxScore>0?'#2E7D32':'#81C784')),borderRadius:6}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}},x:{ticks:{font:{size:10}}}}}
  });
  const best=elig.length>0?elig.reduce((a,b)=>a.score>b.score?a:b):null;
  $('result-best-content').innerHTML=best&&best.score>0
    ?`<div style="text-align:center;padding:20px 0"><div style="font-size:13px;color:var(--text2);margin-bottom:8px">重み付きスコア最高日</div><div style="font-size:32px;font-weight:900;color:var(--ok)">${fmt(best.date)}</div><div style="font-size:14px;color:var(--text2);margin-top:8px">スコア ${best.score} ｜ ○${best.ok}人 △${best.maybe}人 ×${best.no}人</div></div>`
    :`<div style="text-align:center;color:var(--text2);padding:30px">${Object.keys(ans).length===0?'まだ回答がありません':'全員が参加できる日がありません'}</div>`;
}

async function loginAdmin(){
  const id=$('admin-id-input').value.trim().toUpperCase();
  const pass=$('admin-pass-input').value.trim();
  if(!id||!pass){toast('IDとパスワードを入力してください');return}
  try{
    const snap=await get(ref(_db,`events/${id}`));
    if(!snap.exists()){toast('イベントが見つかりません');return}
    const data=snap.val();
    if(data.adminPass!==pass){toast('パスワードが違います');return}
    state.eventId=id;state.eventData=data;state.adminToken=pass;
    renderAdmin(data);go('admin');
  }catch(e){toast('読み込み失敗');console.error(e)}
}
function renderAdmin(data){
  $('admin-event-info').innerHTML=`<div style="font-size:18px;font-weight:800">${data.name}</div><div style="font-size:12px;color:var(--text2);margin-top:4px">ID: ${data.id}</div>`;
  const ans=data.answers||{},prio=data.priorities||{},parts=Object.values(ans);
  if(!parts.length){$('admin-participants').innerHTML='<div style="text-align:center;color:var(--text2);padding:20px">まだ回答がありません</div>';return}
  $('admin-participants').innerHTML=parts.map(p=>{
    const k=p.name.replace(/[.#$[\]]/g,'_'),pr=prio[k]||'normal';
    return`<div class="participant-row"><div class="participant-name">${p.name}</div>
      <select class="priority-select" id="prio-${k}">
        <option value="required" ${pr==='required'?'selected':''}>🔴 必須</option>
        <option value="important" ${pr==='important'?'selected':''}>🟡 重要</option>
        <option value="normal" ${pr==='normal'?'selected':''}>⚪ 一般</option>
      </select></div>`;
  }).join('');
}
async function saveAdmin(){
  const ans=state.eventData.answers||{},prio={};
  Object.values(ans).forEach(p=>{const k=p.name.replace(/[.#$[\]]/g,'_'),s=$(`prio-${k}`);if(s)prio[k]=s.value});
  try{await update(ref(_db,`events/${state.eventId}`),{priorities:prio});toast('重要度を保存しました')}
  catch(e){toast('保存失敗');console.error(e)}
}

// ===== イベント登録 =====
document.querySelectorAll('[data-screen]').forEach(el=>el.addEventListener('click',()=>go(el.dataset.screen)));
document.querySelectorAll('[data-tab]').forEach(el=>el.addEventListener('click',()=>{
  const name=el.dataset.tab;
  ['table','chart','best'].forEach(t=>{
    $(`result-tab-${t}`).style.display=t===name?'block':'none';
    $(`tab-${t}`).classList.toggle('active',t===name);
  });
}));
$('cal-prev').addEventListener('click',()=>{if(state.calMonth===0){state.calMonth=11;state.calYear--}else state.calMonth--;renderCal()});
$('cal-next').addEventListener('click',()=>{if(state.calMonth===11){state.calMonth=0;state.calYear++}else state.calMonth++;renderCal()});
$('btn-create-event').addEventListener('click',createEvent);
$('btn-copy-id').addEventListener('click',()=>navigator.clipboard.writeText(state.eventId).then(()=>toast('IDをコピーしました')));
$('btn-go-admin').addEventListener('click',()=>{renderAdmin(state.eventData);go('admin')});
$('btn-join-event').addEventListener('click',joinEvent);
$('join-id').addEventListener('input',e=>e.target.value=e.target.value.toUpperCase());
$('btn-submit-answer').addEventListener('click',submitAnswer);
$('btn-load-result').addEventListener('click',loadResult);
$('result-id-input').addEventListener('input',e=>e.target.value=e.target.value.toUpperCase());
$('btn-login-admin').addEventListener('click',loginAdmin);
$('admin-id-input').addEventListener('input',e=>e.target.value=e.target.value.toUpperCase());
$('btn-save-admin').addEventListener('click',saveAdmin);

const urlId=new URLSearchParams(location.search).get('id');
if(urlId){$('join-id').value=urlId.toUpperCase();$('result-id-input').value=urlId.toUpperCase()}
renderCal();
</script>
</body>
</html>
